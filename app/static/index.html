          {/* Fixed-height top section: header + saved resumes + upload */}
          <div className="shrink-0">
            {/* Header row */}
            <div className="flex items-start justify-between mb-2">
              <div>
                <h2 className="text-2xl font-bold mb-1">Resume</h2>
                <p className="text-slate-400">Upload or select resume — required for sections marked with <ResumeBadge size={12} /></p>
              </div>
              <button
                onClick={onContinue}
                disabled={!onContinue}
                className="ml-6 px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 disabled:cursor-not-allowed transition whitespace-nowrap shrink-0"
              >
                Save &amp; Continue →
              </button>
            </div>

            {savedResumes.length > 0 && (
              <details ref={detailsRef} className="mt-4 mb-4 bg-slate-900 rounded-xl border border-slate-800">
                <summary className="px-4 py-3 cursor-pointer hover:bg-slate-800/50 transition rounded-xl flex items-center justify-between">
                  <span className="text-sm font-semibold text-slate-300">{`Saved resumes (${savedResumes.length})`}</span>
                  <span className="text-xs text-slate-500">Expand to select or manage</span>
                </summary>
                <div className="px-4 pb-4 space-y-2 max-h-64 overflow-y-auto">
                  {savedResumes.map(r => (
                    <div key={r.id} className="flex items-center gap-3 p-3 rounded-xl bg-slate-800 border border-slate-700">
                      <button onClick={() => handleSelect(r.id)} disabled={!!selectingId} className="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-600 bg-slate-700/40 text-slate-300 hover:bg-slate-600/50 disabled:opacity-50 transition shrink-0">
                        {selectingId === r.id ? 'Selecting…' : 'Select'}
                      </button>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-sm text-slate-300 truncate">{r.description || 'Unnamed'}</div>
                        <div className="text-xs text-slate-500">{new Date(r.created_at).toLocaleString()}</div>
                      </div>
                      <button onClick={() => handleDelete(r.id)} disabled={!!deletingId} className="px-3 py-1.5 rounded-lg text-xs font-medium border border-red-800 bg-red-950/40 text-red-300 hover:bg-red-900/50 disabled:opacity-50 transition shrink-0">
                        {deletingId === r.id ? '…' : 'Delete'}
                      </button>
                    </div>
                  ))}
                </div>
              </details>
            )}

            <div className="mb-4">
              <div className="text-sm font-medium text-slate-300 mb-2">Upload new resume</div>
              <div
                onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => fileInputRef.current?.click()}
                className={`p-4 border-2 border-dashed rounded-xl text-center cursor-pointer transition-all ${dragOver ? 'border-indigo-400 bg-indigo-950/30' : 'border-slate-700 hover:border-slate-500 bg-slate-900/50'}`}
              >
                <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc,.txt,.md,.rtf" className="hidden" onChange={(e) => handleFileUpload(e.target.files?.[0])} />
                {uploadStatus === 'uploading' ? (
                  <div className="flex items-center justify-center gap-2 text-indigo-400"><LoadingDots label={`Extracting text from ${uploadedFileName}…`} /></div>
                ) : uploadStatus === 'done' ? (
                  <div className="text-green-400">
                    <span className="text-lg">&#10003;</span>
                    <span className="ml-2 text-sm">{uploadedFileName} — saved to library</span>
                    <div className="text-xs text-slate-500 mt-1">Click or drop another file to add another</div>
                  </div>
                ) : (
                  <div>
                    <div className="text-slate-400 text-sm"><span className="text-indigo-400 font-medium">Click to upload</span> or drag and drop your resume</div>
                    <div className="text-xs text-slate-600 mt-1">PDF, DOCX, TXT, MD — max 10 MB</div>
                  </div>
                )}
              </div>
            </div>

            <div className="text-sm font-medium text-slate-300 mb-2">{(resumeTagged || resume) ? 'Current resume — review or edit below' : 'Or paste resume text manually'}</div>
          </div>

          {/* Editor fills remaining vertical space */}
          <div className="flex flex-col flex-1 min-h-0">
            <div className="border border-slate-700 rounded-xl overflow-hidden flex flex-col flex-1 min-h-0">
              <div className="flex border-b border-slate-700 bg-slate-900 px-3 shrink-0 items-center">
                {[['edit', 'Edit'], ['raw', 'Raw format'], ['preview', 'Preview']].map(([key, label]) => (
                  <button key={key} onClick={() => setResumeTab(key)}
                    className={`px-4 py-2 text-xs font-medium border-b-2 -mb-px transition ${resumeTab === key ? 'border-indigo-500 text-white' : 'border-transparent text-slate-400 hover:text-slate-300'}`}>
                    {label}
                  </button>
                ))}
                {resumeTab === 'preview' && (
                  <label
                    className="ml-auto flex items-center gap-1.5 text-xs text-slate-400 cursor-pointer select-none"
                    title={"Name and contact info come from Settings → Resume Info fields.\n\nThey are stripped from the parsed resume text so your personal details are never sent to the LLM API."}
                  >
                    <input
                      type="checkbox"
                      checked={showContact}
                      onChange={e => setShowContact(e.target.checked)}
                      className="accent-indigo-500 cursor-pointer"
                    />
                    Show contact info
                  </label>
                )}
              </div>
              {resumeTab === 'edit' ? (
                loadingResume ? (
                  <div className="flex-1 min-h-0 bg-slate-950 p-4 overflow-hidden animate-pulse">
                    {[0.9, 1, 0.75, 1, 0.85, 0, 0.6, 1, 0.9, 0, 0.95, 1, 0.7, 1, 0.8, 0, 0.5].map((w, i) => (
                      w === 0
                        ? <div key={i} className="h-4" />
                        : <div key={i} className="h-2.5 bg-slate-800 rounded mb-2.5" style={{ width: `${w * 100}%` }} />
                    ))}
                  </div>
                ) : (
                  <textarea
                    ref={textareaRef}
                    key={resumeVersion}
                    value={resumeTagged}
                    onChange={(e) => setResumeTagged(e.target.value)}
                    placeholder="Upload or paste your resume — tags will appear here after parsing…"
                    style={resumeVersion > 0 ? { animation: 'fadeIn 0.5s ease-out' } : {}}
                    className="w-full px-4 py-3 bg-slate-950 text-white placeholder-slate-500 focus:outline-none resize-none text-sm font-mono flex-1 min-h-0"
                  />
                )
              ) : resumeTab === 'raw' ? (
                <pre className="px-4 py-3 bg-slate-950 text-slate-300 text-xs font-mono whitespace-pre-wrap overflow-y-auto flex-1 min-h-0">
                  {resumeRaw || '(no raw data — only available after file upload)'}
                </pre>
              ) : (
                <div className="px-6 py-4 bg-slate-950 text-slate-200 text-sm overflow-y-auto flex-1 min-h-0" dangerouslySetInnerHTML={{
                  __html: (() => {
                    if (!resumeTagged && !resume) return '<p style="color:#64748b;font-size:0.875rem">Nothing to preview yet.</p>';
                    let header = '';
                    if (showContact && (contactName || contactInfo)) {
                      header += `<div style="margin:0 0 12px">`;
                      if (contactName) header += `<p style="font-size:1.4em;font-weight:700;margin:0 0 4px;line-height:1.2">${DOMPurify.sanitize(contactName)}</p>`;
                      header += `<div style="border-bottom:1px solid #94a3b8;margin:0 0 4px"></div>`;
                      if (contactInfo) header += `<p style="font-size:0.78em;font-weight:700;color:#cbd5e1;margin:0">${DOMPurify.sanitize(contactInfo)}</p>`;
                      header += `</div>`;
                    }
                    return header + DOMPurify.sanitize(taggedToHtml(resumeTagged || resume));
                  })()
                }} />
              )}
            </div>
            <div className="mt-2 flex items-center justify-between shrink-0 gap-3">
              {resumeTab === 'edit' ? (
                <select
                  value=""
                  onChange={(e) => { if (e.target.value) { handleInsertTag(e.target.value); e.target.value = ''; } }}
                  className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-xs text-slate-300 focus:outline-none focus:border-indigo-500 cursor-pointer"
                >
                  <option value="">Insert tag…</option>
                  {[
                    ['Summary',         'Professional summary paragraph'],
                    ['Section Heading', 'Major section title'],
                    ['Job title',       'Role | Company | Location | Dates'],
                    ['Job summary',     'Brief description of the role'],
                    ['Job bullet',      'Achievement or responsibility'],
                    ['Skill',           'Category: skill1, skill2, …'],
                    ['Additional info', 'Education, certification, award'],
                  ].map(([tag, desc]) => (
                    <option key={tag} value={tag}>{`[${tag}]`} — {desc}</option>
                  ))}
                </select>
              ) : <div />}
              <button onClick={openSaveDialog} disabled={saving || (!resumeTagged.trim() && !resume.trim())}
                className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed transition">
                {saving ? 'Saving…' : 'Save to library'}
              </button>
            </div>
          </div>

          {showSaveDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-2xl">
                <h3 className="text-lg font-semibold text-white mb-2">Save resume to library</h3>
                <p className="text-sm text-slate-400 mb-4">Give this resume a description so you can identify it later.</p>
                <input
                  autoFocus
                  value={saveDescription}
                  onChange={(e) => setSaveDescription(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleSaveToLibrary(); if (e.key === 'Escape') setShowSaveDialog(false); }}
                  placeholder={`Resume — ${new Date().toLocaleDateString()}`}
                  className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition mb-5"
                />
                <div className="flex justify-end gap-3">
                  <button
                    onClick={() => setShowSaveDialog(false)}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={handleSaveToLibrary}
                    className="px-5 py-2 rounded-lg font-medium text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 transition"
                  >
                    Save
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Queue Dropdown ───────────────────────────────────────────────────────
    const QUEUE_SECTIONS = [
      { key: 'research',       label: 'Research' },
      { key: 'interview_intel', label: 'Interview Intel' },
      { key: 'jd_decode',      label: 'Job Decoder' },
      { key: 'resume_tailor',  label: 'Resume Tailor' },
      { key: 'stories',        label: 'Story Bank' },
      { key: 'pitch',          label: 'Pitch' },
      { key: 'concerns',       label: 'Concerns' },
      { key: 'salary',         label: 'Salary' },
    ];

    function QueueDropdown({ stateId, queueStatus, onQueueAction }) {
      const [open, setOpen] = useState(false);
      const [selections, setSelections] = useState(new Set());
      const ref = useRef(null);

      const runningKey = queueStatus?.running?.section_key;
      const queuedKeys = new Set((queueStatus?.queued || []).map(item => item.section_key));

      const openDropdown = () => {
        const initial = new Set();
        if (runningKey) initial.add(runningKey);
        queuedKeys.forEach(k => initial.add(k));
        setSelections(initial);
        setOpen(true);
      };

      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [open]);

      const nonRunning = QUEUE_SECTIONS.filter(s => s.key !== runningKey);
      const allSelected = nonRunning.length > 0 && nonRunning.every(s => selections.has(s.key));

      const toggle = (key) => {
        if (key === runningKey) return;
        setSelections(prev => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key); else next.add(key);
          return next;
        });
      };

      const handleSelectOrClearAll = async () => {
        if (allSelected) {
          const cleared = new Set();
          if (runningKey) cleared.add(runningKey);
          setSelections(cleared);
          for (const s of QUEUE_SECTIONS) {
            if (s.key === runningKey) continue;
            if (queuedKeys.has(s.key)) {
              await onQueueAction({ sectionKey: s.key, title: s.label });
            }
          }
        } else {
          setSelections(new Set(QUEUE_SECTIONS.map(s => s.key)));
        }
      };

      const handleApply = async () => {
        setOpen(false);
        for (const s of QUEUE_SECTIONS) {
          if (s.key === runningKey) continue;
          const isQueued = queuedKeys.has(s.key);
          const isSelected = selections.has(s.key);
          if (isSelected && !isQueued) {
            await onQueueAction({ sectionKey: s.key, title: s.label });
          } else if (!isSelected && isQueued) {
            await onQueueAction({ sectionKey: s.key, title: s.label });
          }
        }
      };

      return (
        <div className="relative" ref={ref}>
          <button
            type="button"
            onClick={open ? () => setOpen(false) : openDropdown}
            disabled={!stateId}
            className="flex items-center justify-center px-2.5 h-full rounded-r-xl rounded-l-none text-white bg-purple-600 hover:bg-purple-500 border-l border-white/20 disabled:opacity-50 transition"
            aria-label="Manage AI queue"
            title="Manage AI queue"
          >
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <circle cx="7" cy="2" r="1.5"/>
              <circle cx="7" cy="7" r="1.5"/>
              <circle cx="7" cy="12" r="1.5"/>
            </svg>
          </button>
          {open && (
            <div className="absolute right-0 top-full mt-1 w-52 bg-slate-900 border border-slate-700 rounded-xl shadow-xl z-50 py-2">
              {QUEUE_SECTIONS.map(s => {
                const isRunning = s.key === runningKey;
                const checked = selections.has(s.key);
                return (
                  <label
                    key={s.key}
                    className={`flex items-center gap-3 px-4 py-2 select-none ${isRunning ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:bg-slate-800 transition'}`}
                  >
                    <input
                      type="checkbox"
                      checked={checked}
                      disabled={isRunning}
                      onChange={() => toggle(s.key)}
                      className="w-4 h-4 rounded accent-indigo-500 shrink-0"
                    />
                    <span className="text-sm text-slate-200 flex-1">{s.label}</span>
                    {isRunning && <span className="text-xs text-amber-400">running</span>}
                  </label>
                );
              })}
              <div className="border-t border-slate-700 mt-2 pt-2 px-3 flex gap-2">
                <button
                  type="button"
                  onClick={handleSelectOrClearAll}
                  className="flex-1 py-1.5 text-sm font-medium text-slate-300 border border-slate-600 rounded-lg hover:bg-slate-800 transition"
                >
                  {allSelected ? 'Clear all' : 'Select all'}
                </button>
                <button
                  type="button"
                  onClick={handleApply}
                  className="flex-1 py-1.5 text-sm font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 rounded-lg transition"
                >
                  Apply
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Agent Step (Generic for research, jd_decode, salary, concerns, pitch) ──
    function AgentStep({ stateId, stepId, title, description, endpoint, resultKey, cached, queryMeta = {}, onComplete, onContinue, usesWebSearch = false, queueItem = null, failedQueueItem = null, hasRunningQueueItem = false, onQueueAction, queueStatus = null }) {
      const [result, setResult] = useState(cached || '');
      const [costUsd, setCostUsd] = useState(queryMeta.costUsd || 0);
      const [modelName, setModelName] = useState(queryMeta.modelName || '');
      const [durationMs, setDurationMs] = useState(queryMeta.durationMs || 0);
      const [queryRanAt, setQueryRanAt] = useState(queryMeta.ranAt || '');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [errorDetail, setErrorDetail] = useState('');
      const [liveTrace, setLiveTrace] = useState(null);
      const costLabel = hasPositiveQueryCost(costUsd)
        ? formatQueryCost(costUsd)
        : (modelName || queryRanAt) ? 'No query cost' : '';
      const isRunning = queueItem?.status === 'running' || queueItem?.status === 'canceling';
      const isQueued = queueItem?.status === 'queued';

      // Sync cached prop when navigating back to a previously-run step
      useEffect(() => {
        if (cached && !result) setResult(cached);
      }, [cached]);

      useEffect(() => {
        if (hasPositiveQueryCost(queryMeta.costUsd) && !costUsd) setCostUsd(queryMeta.costUsd);
      }, [queryMeta.costUsd]);

      useEffect(() => {
        if (queryMeta.modelName && !modelName) setModelName(queryMeta.modelName);
      }, [queryMeta.modelName]);

      useEffect(() => {
        if (queryMeta.durationMs && !durationMs) setDurationMs(queryMeta.durationMs);
      }, [queryMeta.durationMs]);

      useEffect(() => {
        if (queryMeta.ranAt && !queryRanAt) setQueryRanAt(queryMeta.ranAt);
      }, [queryMeta.ranAt]);

      const handleAgentEvent = useCallback((event) => {
        if (event.type === 'send') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            if (event.channel === 'system') return { ...next, systemPrompt: event.text || '' };
            if (event.channel === 'user') return { ...next, userPrompt: event.text || '' };
            return next;
          });
        } else if (event.type === 'tool_use') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            return { ...next, toolUses: [...(next.toolUses || []), event] };
          });
        } else if (event.type === 'receive') {
          setLiveTrace((prev) => ({
            ...(prev || createLiveTrace()),
            response: `${(prev && prev.response) || ''}${event.text || ''}`,
            retryRemaining: null,
          }));
        } else if (event.type === 'rate_limit_reset') {
          setLiveTrace((prev) => ({ ...(prev || createLiveTrace()), response: '', retryRemaining: -1 }));
        } else if (event.type === 'rate_limit_retry') {
          setLiveTrace((prev) => ({
            ...(prev || createLiveTrace()),
            retryRemaining: event.remaining_seconds,
          }));
        } else if (event.type === 'complete') {
          setResult(event.result || '');
          setCostUsd(event.cost_usd || 0);
          setModelName(event.model_name || '');
          setDurationMs(event.duration_ms || 0);
          setQueryRanAt(event.query_ran_at || '');
          setLiveTrace(null);
          setLoading(false);
          void Promise.resolve(onComplete && onComplete()).catch(() => {});
        } else if (event.type === 'error') {
          setError(event.message || 'Request failed');
          setErrorDetail(event.detail || '');
          setLiveTrace(null);
          setLoading(false);
        } else if (event.type === 'canceled') {
          setLiveTrace(null);
          setLoading(false);
        }
      }, [onComplete]);

      useEffect(() => {
        if (!failedQueueItem) return;
        setError(failedQueueItem.error || 'Request failed');
        setErrorDetail(failedQueueItem.error_detail || '');
        setLiveTrace(null);
        setLoading(false);
      }, [failedQueueItem?.id]);

      useEffect(() => {
        if (!queueItem || queueItem.status !== 'running') {
          if (!queueItem) setLoading(false);
          if (queueItem?.status === 'queued') {
            setLiveTrace(null);
            setLoading(false);
          }
          return;
        }
        let canceled = false;
        setLoading(true);
        setError('');
        setErrorDetail('');
        setLiveTrace((prev) => prev || createLiveTrace());
        api.streamGet(`/queue/${queueItem.id}/events`, (event) => {
          if (!canceled && event.type !== 'heartbeat' && event.type !== 'queue_status') handleAgentEvent(event);
        }).catch((e) => {
          if (!canceled) {
            setError(e.message);
            setErrorDetail(e.detail || '');
            setLiveTrace(null);
            setLoading(false);
          }
        });
        return () => { canceled = true; };
      }, [queueItem?.id, queueItem?.status, handleAgentEvent]);

      const run = async () => {
        if (!onQueueAction) return;
        setError('');
        setErrorDetail('');
        try {
          await onQueueAction({ sectionKey: stepId, title });
        } catch (e) {
          setError(e.message);
          setErrorDetail(e.detail || '');
          setLiveTrace(null);
          setLoading(false);
        }
      };
      const buttonText = isRunning
        ? (queueItem?.status === 'canceling' ? 'Stopping AI...' : 'Stop AI')
        : isQueued
          ? "Don't Run AI"
          : hasRunningQueueItem
            ? 'Run AI Later'
            : 'Run AI';

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
          <div className="flex items-start justify-between mb-6 shrink-0">
            <div>
              <div className="flex items-baseline gap-3">
                <h2 className="text-2xl font-bold flex items-center gap-2">
                  {title}
                  {usesWebSearch && <WebSearchBadge size={16} />}
                </h2>
                <QueryCostBadge
                  label={costLabel}
                  details={[{ label: title, modelName, durationMs, ranAt: queryRanAt }]}
                />
              </div>
              <p className="text-slate-400 mt-1">{description}</p>
            </div>
            <div className="flex gap-2 ml-6 shrink-0">
              <div className="flex">
                <button
                  onClick={run}
                  disabled={queueItem?.status === 'canceling'}
                  className="px-6 py-2.5 rounded-l-xl rounded-r-none font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 transition whitespace-nowrap"
                >
                  {buttonText}
                </button>
                <QueueDropdown stateId={stateId} queueStatus={queueStatus} onQueueAction={onQueueAction} />
              </div>
              {onContinue && (
                <button onClick={onContinue} className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition whitespace-nowrap">
                  Continue →
                </button>
              )}
            </div>
          </div>

          {isRunning && liveTrace ? (
            <div className="overflow-y-auto flex-1 min-h-0">
              {loading && <BookResearchAnimation label={`${title} agent is working… this may take a few minutes`} />}
              <LiveTracePanel trace={liveTrace} title={`${title} Live Trace`} />
            </div>
          ) : (
            <>
              {error && <ErrorBlock message={error} detail={errorDetail} />}
              {result && (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 overflow-y-auto flex-1 min-h-0">
                  {error && <p className="text-xs text-slate-500 mb-4 italic">Showing previous result from last successful run.</p>}
                  <Markdown text={result} />
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ── Story Bank Step ─────────────────────────────────────────────────────
    function StoryBankStep({ stateId, queryMeta = {}, onComplete, onContinue, queueItem = null, failedQueueItem = null, hasRunningQueueItem = false, onQueueAction, queueStatus = null }) {
      const [stories, setStories] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [errorDetail, setErrorDetail] = useState('');
      const [expanded, setExpanded] = useState({});
      const [costUsd, setCostUsd] = useState(queryMeta.costUsd || 0);
      const [modelName, setModelName] = useState(queryMeta.modelName || '');
      const [durationMs, setDurationMs] = useState(queryMeta.durationMs || 0);
      const [queryRanAt, setQueryRanAt] = useState(queryMeta.ranAt || '');
      const [liveTrace, setLiveTrace] = useState(null);
      const isRunning = queueItem?.status === 'running' || queueItem?.status === 'canceling';
      const isQueued = queueItem?.status === 'queued';

      useEffect(() => { if (hasPositiveQueryCost(queryMeta.costUsd) && !costUsd) setCostUsd(queryMeta.costUsd); }, [queryMeta.costUsd]);
      useEffect(() => { if (queryMeta.modelName && !modelName) setModelName(queryMeta.modelName); }, [queryMeta.modelName]);
      useEffect(() => { if (queryMeta.durationMs && !durationMs) setDurationMs(queryMeta.durationMs); }, [queryMeta.durationMs]);
      useEffect(() => { if (queryMeta.ranAt && !queryRanAt) setQueryRanAt(queryMeta.ranAt); }, [queryMeta.ranAt]);

      useEffect(() => {
        api.get(`/${stateId}/stories`).then(d => setStories(d.stories)).catch(() => {});
      }, [stateId]);

      const handleStoryEvent = useCallback((event) => {
        if (event.type === 'send') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            if (event.channel === 'system') return { ...next, systemPrompt: event.text || '' };
            if (event.channel === 'user') return { ...next, userPrompt: event.text || '' };
            return next;
          });
        } else if (event.type === 'tool_use') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            return { ...next, toolUses: [...(next.toolUses || []), event] };
          });
        } else if (event.type === 'receive') {
          setLiveTrace((prev) => ({
            ...(prev || createLiveTrace()),
            response: `${(prev && prev.response) || ''}${event.text || ''}`,
            retryRemaining: null,
          }));
        } else if (event.type === 'rate_limit_reset') {
          setLiveTrace((prev) => ({ ...(prev || createLiveTrace()), response: '', retryRemaining: -1 }));
        } else if (event.type === 'rate_limit_retry') {
          setLiveTrace((prev) => ({
            ...(prev || createLiveTrace()),
            retryRemaining: event.remaining_seconds,
          }));
        } else if (event.type === 'complete') {
          if (event.stories) setStories(event.stories);
          setCostUsd(event.cost_usd || 0);
          setModelName(event.model_name || '');
          setDurationMs(event.duration_ms || 0);
          setQueryRanAt(event.query_ran_at || '');
          setLiveTrace(null);
          setLoading(false);
          void Promise.resolve(onComplete && onComplete()).catch(() => {});
        } else if (event.type === 'error') {
          setError(event.message || 'Request failed');
          setErrorDetail(event.detail || '');
          setLiveTrace(null);
          setLoading(false);
        } else if (event.type === 'canceled') {
          setLiveTrace(null);
          setLoading(false);

            setErrorDetail(e.detail || '');

    // ── Debrief Step ────────────────────────────────────────────────────────
    // ── Line diff (LCS-based) ────────────────────────────────────────────
    function diffLines(oldText, newText) {
      const a = (oldText || '').split('\n');
      const b = (newText || '').split('\n');
      const m = a.length, n = b.length;
      // Build LCS table
      const dp = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));
      for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
      // Backtrack
      const result = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
          result.push({ type: 'equal', value: a[i-1] }); i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
          result.push({ type: 'add', value: b[j-1] }); j--;
        } else {
          result.push({ type: 'del', value: a[i-1] }); i--;
        }
      }
      return result.reverse();
    }

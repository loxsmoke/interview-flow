      useEffect(() => { editedResumeRef.current = editedResume; }, [editedResume]);
      useEffect(() => { isDirtyRef.current = isDirty; }, [isDirty]);
      // Auto-save on unmount (section switch) if there are unsaved changes
      useEffect(() => () => {
        if (isDirtyRef.current && editedResumeRef.current) {
          const plain = stripResumeTags(editedResumeRef.current);
          api.post(`/${stateId}/resume-update`, { resume: plain, tagged: editedResumeRef.current });
        }
      }, [stateId]);
      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);
      useEffect(() => { if (hasPositiveQueryCost(queryMeta.costUsd) && !costUsd) setCostUsd(queryMeta.costUsd); }, [queryMeta.costUsd]);
      useEffect(() => { if (queryMeta.modelName && !modelName) setModelName(queryMeta.modelName); }, [queryMeta.modelName]);
      useEffect(() => { if (queryMeta.durationMs && !durationMs) setDurationMs(queryMeta.durationMs); }, [queryMeta.durationMs]);
      useEffect(() => { if (queryMeta.ranAt && !queryRanAt) setQueryRanAt(queryMeta.ranAt); }, [queryMeta.ranAt]);
      useEffect(() => {
        const el = splitContainerRef.current;
        if (!el) return;
        const obs = new ResizeObserver(entries => {
          setIsVertical((entries[0]?.contentRect.width ?? 0) < 640);
        });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const handleReviewEvent = useCallback((event) => {
        if (event.type === 'send') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            if (event.channel === 'system') return { ...next, systemPrompt: event.text || '' };
            if (event.channel === 'user') return { ...next, userPrompt: event.text || '' };
            return next;
          });
        } else if (event.type === 'receive') {
          setLiveTrace((prev) => ({
            ...(prev || createLiveTrace()),
            response: `${(prev && prev.response) || ''}${event.text || ''}`,
          }));
        } else if (event.type === 'rate_limit_reset') {
          setLiveTrace((prev) => ({ ...(prev || createLiveTrace()), response: '' }));
        } else if (event.type === 'complete') {
          setAnalysis(event.result || '');
          setCostUsd(event.cost_usd || 0);
          setModelName(event.model_name || '');
          setDurationMs(event.duration_ms || 0);
          setQueryRanAt(event.query_ran_at || '');
          setLiveTrace(null);
          setLoading(false);
          void Promise.resolve(onComplete && onComplete()).catch(() => {});
        } else if (event.type === 'error') {
          setError(event.message || 'Request failed');
          setErrorDetail(event.detail || '');
          setLiveTrace(null);
          setLoading(false);
        } else if (event.type === 'canceled') {
          setLiveTrace(null);
          setLoading(false);
        }
      }, [onComplete]);

      useEffect(() => {
        if (!failedQueueItem) return;
        setError(failedQueueItem.error || 'Request failed');
        setErrorDetail(failedQueueItem.error_detail || '');
        setLiveTrace(null);
        setLoading(false);
      }, [failedQueueItem?.id]);

      useEffect(() => {
        if (!queueItem || queueItem.status !== 'running') {
          if (!queueItem) setLoading(false);
          if (queueItem?.status === 'queued') {
            setLiveTrace(null);
            setLoading(false);
          }
          return;
        }
        let canceled = false;
        setLoading(true);
        setError('');
        setErrorDetail('');
        setLiveTrace((prev) => prev || createLiveTrace());
        api.streamGet(`/queue/${queueItem.id}/events`, (event) => {
          if (!canceled && event.type !== 'heartbeat' && event.type !== 'queue_status') handleReviewEvent(event);
        }).catch((e) => {
          if (!canceled) {
            setError(e.message);
            setErrorDetail(e.detail || '');
            setLiveTrace(null);
            setLoading(false);
          }
        });
        return () => { canceled = true; };
      }, [queueItem?.id, queueItem?.status, handleReviewEvent]);

      const runReview = async () => {
        if (!onQueueAction) return;
        setError('');
        setErrorDetail('');
        try {
          await onQueueAction({ sectionKey: 'resume_tailor', title: 'Resume Tailor' });
        } catch (e) {
          setError(e.message);
          setErrorDetail(e.detail || '');
          setLiveTrace(null);
          setLoading(false);
        }
      };
      const reviewButtonText = isRunning
        ? (queueItem?.status === 'canceling' ? 'Stopping AI...' : 'Stop AI')
        : isQueued
          ? "Don't Run AI"
          : hasRunningQueueItem
            ? 'Run AI Later'
            : 'Run AI';

      const hasAiDraft = React.useMemo(() =>
        analysis ? /^#{1,6}\s*6[^#\n]*tailored resume draft/im.test(analysis) : false,
        [analysis]
      );

      const doSave = async (text) => {
        const plain = stripResumeTags(text);
        await api.post(`/${stateId}/resume-update`, { resume: plain, tagged: text });
        lastSavedRef.current = text;
        setIsDirty(false);
        isDirtyRef.current = false;
      };

      const saveResume = async () => {
        setSaving(true);
        try {
          await doSave(editedResume);
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        } catch (e) {
          alert('Error: ' + e.message);
        }
        setSaving(false);
      };

      const handleContinue = async () => {
        if (isDirty) {
          try { await doSave(editedResume); } catch (_) {}
        }
        onContinue?.();
      };

      const handleInsertTag = (tag) => {
        const ta = tailorTextareaRef.current;
        const text = editedResume;
        const pos = ta ? (ta.selectionStart ?? text.length) : text.length;
        const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
        const lineEnd = text.indexOf('\n', pos);
        const end = lineEnd === -1 ? text.length : lineEnd;
        const line = text.slice(lineStart, end);
        const cleanLine = line.replace(/^\[[^\]]+\]\s*/, '');
        const newTag = `[${tag}]`;
        const newText = text.slice(0, lineStart) + newTag + cleanLine + text.slice(end);
        setEditedResume(newText);
        setIsDirty(newText !== lastSavedRef.current);
        setSaved(false);
        requestAnimationFrame(() => {
          if (ta) { ta.focus(); ta.setSelectionRange(lineStart + newTag.length, lineStart + newTag.length); }
        });
      };

      const downloadDocx = async () => {
        setDownloading(true);
        setExportedPath('');
        try {
          if (window.showSaveFilePicker) {
            // Native OS save dialog via File System Access API
            const cleanPart = (s, pipe) => {
              let v = pipe ? s.split('|')[0] : s;
              return v.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_');
            };
            const today = new Date();
            const dateStr = today.getFullYear().toString() +
              String(today.getMonth() + 1).padStart(2, '0') +
              String(today.getDate()).padStart(2, '0');
            const namePart = cleanPart(contactName || '', true);
            const companyPart = cleanPart(companyName || '', false);
            const parts = [namePart, 'Resume', dateStr, companyPart].filter(Boolean);
            const suggestedName = parts.join('_') + '.docx';
            let fileHandle;
            try {
              fileHandle = await window.showSaveFilePicker({
                suggestedName,
                types: [{ description: 'Word Document', accept: { 'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'] } }],
              });
            } catch (e) {
              if (e.name === 'AbortError') { setDownloading(false); return; }
              throw e;
            }
            const res = await fetch(`/api/${stateId}/resume-download`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tagged_text: editedResume || taggedResume }),
            });
            if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || 'Failed'); }
            const blob = await res.blob();
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            setExportedPath(fileHandle.name);
          } else {
            // Fallback: server writes to Desktop, shows path
            const data = await api.post(`/${stateId}/resume-export`, { tagged_text: editedResume || taggedResume });
            setExportedPath(data.path);
          }
        } catch (e) {
          alert('Export error: ' + e.message);
        }
        setDownloading(false);
      };

      const updateFromAnalysis = () => {
        if (!analysis) return;
        setUpdateError('');
        const match = analysis.match(/^#{1,6}\s*6[^#\n]*tailored resume draft[^#\n]*\n([\s\S]*)$/im);
        if (!match) {
          setUpdateError('No tailored resume draft found in AI analysis. Make sure the AI has run and produced a section 6.');
          return;
        }
        let draft = match[1].trim();
        draft = draft.replace(/\n#{1,6}\s*a note\b[\s\S]*$/i, '').trim();
        setTaggedResume(draft);
        setEditedResume(draft);
        setIsDirty(draft !== lastSavedRef.current);
        setSaved(false);
        setResumeTab('edit');
      };

      const startChat = async () => {
        setChatLoading(true);
        setShowChat(true);
        setChatMessages([]);
        try {
          const data = await api.post(`/${stateId}/resume-chat/start`);
          setChatSessionKey(data.session_key);
          setChatMessages([{ role: 'assistant', content: data.message }]);
        } catch (e) {
          setChatMessages([{ role: 'assistant', content: `Error: ${e.message}` }]);
        }
        setChatLoading(false);
      };

      const sendChatMessage = async () => {
        if (!chatInput.trim() || chatLoading) return;
        const msg = chatInput.trim();
        setChatInput('');
        setChatMessages(prev => [...prev, { role: 'user', content: msg }]);
        setChatLoading(true);
        try {
          const data = await api.post(`/${stateId}/resume-chat/respond`, {
            session_id: chatSessionKey,
            message: msg,
          });
          setChatMessages(prev => [...prev, { role: 'assistant', content: data.message }]);
        } catch (e) {
          setChatMessages(prev => [...prev, { role: 'assistant', content: `Error: ${e.message}` }]);
        }
        setChatLoading(false);
      };

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
          <div className="flex items-center justify-between mb-6 shrink-0">
            <div>
              <div className="flex items-baseline gap-3">
                <h2 className="text-2xl font-bold">Resume Tailor</h2>
                <QueryCostBadge
                  label={costLabel}
                  details={[{ label: 'Resume Tailor', modelName, durationMs, ranAt: queryRanAt }]}
                />
              </div>
              <p className="text-slate-400 mt-1">AI reviews your resume against the JD and suggests targeted improvements.</p>
            </div>
            <div className="flex gap-2">
              <div className="flex">
                <button
                  onClick={runReview}
                  disabled={queueItem?.status === 'canceling'}
                  className="px-5 py-2.5 rounded-l-xl rounded-r-none font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 transition whitespace-nowrap"
                >
                  {reviewButtonText}
                </button>
                <QueueDropdown stateId={stateId} queueStatus={queueStatus} onQueueAction={onQueueAction} />
              </div>
              <button
                onClick={updateFromAnalysis}
                disabled={!hasAiDraft}
                className="px-5 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 disabled:opacity-50 transition whitespace-nowrap"
              >
                Use AI Resume
              </button>
              <button
                onClick={showChat ? () => setShowChat(false) : startChat}
                disabled={chatLoading && !showChat}
                className="px-5 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 disabled:opacity-50 transition whitespace-nowrap"
              >
                {showChat ? 'Hide Chat' : 'Chat with Coach'}
              </button>
              {onContinue && (
                <button onClick={handleContinue} className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition whitespace-nowrap">
                  Continue →
                </button>
              )}
            </div>
          </div>

          {isRunning && liveTrace ? (
            <div className="overflow-y-auto flex-1 min-h-0">
              {isRunning && loading && <BookResearchAnimation label="Comparing your resume against the job description…" />}
              <LiveTracePanel trace={liveTrace} title="Resume Review Live Trace" />
            </div>
          ) : (
            <>
              {isRunning && loading && <BookResearchAnimation label="Comparing your resume against the job description…" />}
              {error && <ErrorBlock message={error} detail={errorDetail} />}
            </>
          )}

          {/* Chat Panel */}
          {showChat && (
            <div className="mb-6 bg-slate-900 border border-cyan-900/50 rounded-xl overflow-hidden shrink-0">
              <div className="px-4 py-3 bg-slate-800/50 border-b border-slate-700 flex items-center justify-between">
                <span className="text-sm font-semibold text-cyan-400">Resume Coach Chat</span>
                <button onClick={() => { setChatSessionKey(''); setChatMessages([]); startChat(); }}
                  className="text-xs text-slate-500 hover:text-slate-300 transition">New Chat</button>
              </div>
              <div className="p-4 overflow-y-auto max-h-[50vh] space-y-4">
                {chatMessages.map((msg, i) => (
                  <div key={i} className={`max-w-[85%] ${msg.role === 'user' ? 'ml-auto' : 'mr-auto'}`}>
                    <div className={`p-3 ${msg.role === 'user' ? 'chat-user' : 'chat-assistant'}`}>
                      <Markdown text={msg.content} />
                    </div>
                    <div className={`text-xs text-slate-600 mt-1 ${msg.role === 'user' ? 'text-right' : ''}`}>
                      {msg.role === 'user' ? 'You' : 'Coach'}
                    </div>
                  </div>
                ))}
                {chatLoading && <div className="mr-auto"><LoadingDots label="Coach is thinking..." /></div>}
                <div ref={chatEndRef} />
              </div>
              <div className="border-t border-slate-700 p-3 flex gap-3">
                <textarea
                  value={chatInput}
                  onChange={(e) => setChatInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } }}
                  placeholder="Ask about specific sections, request rewrites, or paste updated text for feedback..."
                  rows={2}
                  className="flex-1 px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition resize-none"
                />
                <button
                  onClick={sendChatMessage}
                  disabled={!chatInput.trim() || chatLoading}
                  className="px-5 rounded-lg font-medium text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 disabled:opacity-50 transition self-end h-10"
                >
                  Send
                </button>
              </div>
            </div>
          )}

          {analysis && (
            <div ref={splitContainerRef} className={`flex flex-1 min-h-0${isVertical ? ' flex-col' : ''}`} style={{display: (isRunning && liveTrace) ? 'none' : 'flex'}}>
              {/* Left: AI Analysis */}
              <div style={isVertical ? { height: `${splitPct}%` } : { width: `${splitPct}%` }} className="flex flex-col min-h-0 min-w-0">
                <h3 className="text-sm font-semibold text-slate-400 uppercase mb-3 shrink-0">AI Analysis & Suggestions</h3>
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 overflow-y-auto flex-1 min-h-0">
                  {error && <p className="text-xs text-slate-500 mb-4 italic">Showing previous result from last successful run.</p>}
                  <Markdown text={analysis} />
                </div>
              </div>

              {/* Splitter */}
              <div
                onMouseDown={(e) => {
                  e.preventDefault();
                  const container = splitContainerRef.current;
                  if (!container) return;
                  const vert = isVertical;
                  const onMove = (ev) => {
                    const rect = container.getBoundingClientRect();
                    const pct = vert
                      ? Math.min(80, Math.max(20, ((ev.clientY - rect.top)  / rect.height) * 100))
                      : Math.min(80, Math.max(20, ((ev.clientX - rect.left) / rect.width)  * 100));
                    setSplitPct(pct);
                  };
                  const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                  };
                  document.body.style.cursor = vert ? 'row-resize' : 'col-resize';
                  document.body.style.userSelect = 'none';
                  document.addEventListener('mousemove', onMove);
                  document.addEventListener('mouseup', onUp);
                }}
                className={isVertical
                  ? 'h-2 flex-shrink-0 cursor-row-resize flex justify-center items-center group select-none my-1'
                  : 'w-2 flex-shrink-0 cursor-col-resize flex items-center justify-center group select-none mx-1'}
              >
                {isVertical
                  ? <div className="h-px w-full bg-slate-700 group-hover:bg-indigo-500 transition-colors" />
                  : <div className="w-px h-full bg-slate-700 group-hover:bg-indigo-500 transition-colors" />}
              </div>

              {/* Right: Editable Resume with Edit/Preview tabs */}
              <div style={isVertical ? { height: `${100 - splitPct}%` } : { width: `${100 - splitPct}%` }} className="flex flex-col min-h-0 min-w-0">
                <div className="border border-slate-700 rounded-xl overflow-hidden flex flex-col flex-1 min-h-0">
                  {/* Tab bar */}
                  <div className="flex border-b border-slate-700 bg-slate-900 px-3 shrink-0 items-center">
                    <h3 className="text-xs font-semibold text-slate-400 uppercase self-center mr-4">Your Resume</h3>
                    {[['edit', 'Edit'], ['preview', 'Preview'], ['diff', 'Comparison']].map(([key, label]) => (
                      <button
                        key={key}
                        onClick={() => setResumeTab(key)}
                        className={`px-4 py-2 text-xs font-medium border-b-2 -mb-px transition
                          ${resumeTab === key
                            ? 'border-indigo-500 text-white'
                            : 'border-transparent text-slate-400 hover:text-slate-300'}`}
                      >
                        {label}
                      </button>
                    ))}
                    {resumeTab === 'preview' && (
                      <label
                        className="ml-auto flex items-center gap-1.5 text-xs text-slate-400 cursor-pointer select-none"
                        title={"Name and contact info come from Settings → Resume Info fields.\n\nThey are stripped from the parsed resume text so your personal details are never sent to the LLM API."}
                      >
                        <input
                          type="checkbox"
                          checked={showContact}
                          onChange={e => setShowContact(e.target.checked)}
                          className="accent-indigo-500 cursor-pointer"
                        />
                        Show contact info
                      </label>
                    )}
                  </div>
                  {resumeTab === 'edit' ? (
                    <textarea
                      ref={tailorTextareaRef}
                      value={editedResume}
                      onChange={(e) => { setEditedResume(e.target.value); setIsDirty(e.target.value !== lastSavedRef.current); setSaved(false); setUpdateError(''); }}
                      className="w-full px-4 py-3 bg-slate-900 text-white text-sm font-mono focus:outline-none transition resize-none flex-1 min-h-0"
                    />
                  ) : resumeTab === 'preview' ? (
                    <div
                      className="px-6 py-4 bg-slate-900 text-slate-200 text-sm overflow-y-auto flex-1 min-h-0"
                      dangerouslySetInnerHTML={{
                        __html: (() => {
                          if (!editedResume) return '<p style="color:#64748b;font-size:0.875rem">Nothing to preview yet.</p>';
                          let header = '';
                          if (showContact && (contactName || contactInfo)) {
                            header += `<div style="margin:0 0 12px">`;
                            if (contactName) header += `<p style="font-size:1.4em;font-weight:700;margin:0 0 4px;line-height:1.2">${DOMPurify.sanitize(contactName)}</p>`;
                            header += `<div style="border-bottom:1px solid #94a3b8;margin:0 0 4px"></div>`;
                            if (contactInfo) header += `<p style="font-size:0.78em;font-weight:700;color:#cbd5e1;margin:0">${DOMPurify.sanitize(contactInfo)}</p>`;
                            header += `</div>`;
                          }
                          return header + DOMPurify.sanitize(taggedToHtml(editedResume));
                        })()
                      }}
                    />
                  ) : (
                    <div className="overflow-y-auto flex-1 min-h-0 font-mono text-xs leading-5">
                      {diffLines(stripResumeTags(currentResume), stripResumeTags(editedResume)).map((chunk, idx) => (
                        <div
                          key={idx}
                          className={`flex whitespace-pre-wrap px-3 py-0 ${
                            chunk.type === 'del' ? 'bg-red-950/70 text-red-300' :
                            chunk.type === 'add' ? 'bg-green-950/70 text-green-300' :
                            'text-slate-400'
                          }`}
                        >
                          <span className="select-none w-4 shrink-0 mr-2 opacity-60">
                            {chunk.type === 'del' ? '−' : chunk.type === 'add' ? '+' : ' '}
                          </span>
                          <span>{chunk.value}</span>
                        </div>
                      ))}
                      {stripResumeTags(currentResume) === stripResumeTags(editedResume) && (
                        <p className="px-4 py-6 text-slate-500 text-xs">No changes yet.</p>
                      )}
                    </div>
                  )}
                </div>
                {updateError && (
                  <div className="mt-3 p-3 rounded-xl bg-red-900/30 border border-red-800 text-red-300 text-sm shrink-0">
                    {updateError}
                  </div>
                )}
                <div className="flex items-center gap-3 mt-3 shrink-0">
                  {resumeTab === 'edit' ? (
                    <select
                      value=""
                      onChange={(e) => { if (e.target.value) { handleInsertTag(e.target.value); e.target.value = ''; } }}
                      className="px-3 py-2 bg-slate-800 border border-slate-700 rounded-xl text-xs text-slate-300 focus:outline-none focus:border-indigo-500 cursor-pointer min-w-0 max-w-[200px]"
                    >
                      <option value="">Insert tag…</option>
                      {[
                        ['Summary',         'Professional summary paragraph'],
                        ['Section Heading', 'Major section title'],
                        ['Job title',       'Role | Company | Location | Dates'],
                        ['Job summary',     'Brief description of the role'],
                        ['Job bullet',      'Achievement or responsibility'],
                        ['Skill',           'Category: skill1, skill2, …'],
                        ['Additional info', 'Education, certification, award'],
                      ].map(([tag, desc]) => (
                        <option key={tag} value={tag}>{`[${tag}]`} — {desc}</option>
                      ))}
                    </select>
                  ) : <div />}
                  <div className="ml-auto flex items-center gap-3">
                    <button
                      onClick={downloadDocx}
                      disabled={downloading}
                      className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 disabled:opacity-50 transition whitespace-nowrap"
                    >
                      {downloading ? 'Saving...' : 'Export .docx'}
                    </button>
                    <button
                      onClick={saveResume}
                      disabled={saving || !isDirty}
                      className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 disabled:opacity-50 transition whitespace-nowrap"
                    >
                      {saved ? '✓ Saved!' : saving ? 'Saving...' : 'Save'}
                    </button>
                  </div>
                </div>
                {exportedPath && (
                  <div className="mt-2 px-3 py-2 rounded-lg bg-sky-900/30 border border-sky-800 text-sky-300 text-xs shrink-0">
                    Saved to: <span className="font-mono">{exportedPath}</span>
                  </div>
                )}
              </div>
            </div>
          )}

          {!analysis && !loading && !showChat && !(isRunning && liveTrace) && (
            <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-8 text-center">
              <p className="text-slate-400">Click "Analyze Resume vs JD" for a detailed comparison, or "Chat with Coach" to work on changes interactively.</p>
              <p className="text-slate-500 text-sm mt-2">The AI will audit relevance, identify keyword gaps, rewrite key bullets, and draft a tailored version.</p>
            </div>
          )}
        </div>
      );
    }

    // ── Debrief Step ────────────────────────────────────────────────────────
    function DebriefStep({ stateId, totalQueryCostLabel = '', totalQueryDetails = [], totalQueryTooltip = '' }) {
      const [notes, setNotes] = useState('');
      const [saved, setSaved] = useState(false);
      const notesRef = useRef(null);

      const save = async () => {
        try {
          await api.post(`/${stateId}/debrief`, { notes });
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        } catch (e) {
          alert('Error: ' + e.message);
        }
      };

      const insertTimestamp = () => {
        const el = notesRef.current;
        if (!el) return;
        const ts = new Date().toLocaleString();
        const start = el.selectionStart;
        const end = el.selectionEnd;
        const newText = notes.slice(0, start) + ts + notes.slice(end);
        setNotes(newText);
        requestAnimationFrame(() => {
          el.selectionStart = el.selectionEnd = start + ts.length;
          el.focus();
        });
      };

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
          <div className="shrink-0">
            <div className="flex items-baseline gap-3 mb-2">
              <h2 className="text-2xl font-bold">Post-Interview Debrief</h2>
              <QueryCostBadge label={totalQueryCostLabel} details={totalQueryDetails} tooltipText={totalQueryTooltip} />
            </div>
            <p className="text-slate-400 mb-4">Capture what happened while it's fresh. What questions were asked? What went well? What would you do differently?</p>
          </div>

          <div className="flex flex-col flex-1 min-h-0">
            <textarea
              ref={notesRef}
              value={notes}
              onChange={(e) => setNotes(e.target.value)}
              placeholder={"What questions did they ask?\nHow did you feel about your answers?\nAny surprises?\nWhat would you do differently?"}
              className="w-full flex-1 min-h-0 px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition resize-none"
            />
            <div className="mt-3 flex items-center justify-between shrink-0">
              <button
                onClick={insertTimestamp}
                className="px-4 py-2 rounded-xl text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition"
              >
                Insert timestamp
              </button>
              <button
                onClick={save}
                className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition"
              >
                {saved ? '✓ Saved!' : 'Save Debrief'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Custom Action Step ───────────────────────────────────────────────────
    function CustomActionStep({ stateId, action, actionResult, onDelete, onUpdate, queueItem = null, failedQueueItem = null, hasRunningQueueItem = false, onQueueAction }) {
      const [editing, setEditing] = useState(false);
      const [name, setName] = useState(action.name || '');
      const [description, setDescription] = useState(action.description || '');
      const [promptTemplate, setPromptTemplate] = useState(action.prompt_template || '');
      const [temperatureInput, setTemperatureInput] = useState(action.temperature != null ? String(action.temperature) : '');
      const [nameError, setNameError] = useState('');
      const [saving, setSaving] = useState(false);
      const [result, setResult] = useState(actionResult?.result || '');
      const [costUsd, setCostUsd] = useState(actionResult?.cost_usd || 0);
      const [modelName, setModelName] = useState(actionResult?.model_name || '');
      const [durationMs, setDurationMs] = useState(actionResult?.duration_ms || 0);
      const [queryRanAt, setQueryRanAt] = useState(actionResult?.ran_at || '');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [errorDetail, setErrorDetail] = useState('');
      const [liveTrace, setLiveTrace] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [showTagMenu, setShowTagMenu] = useState(false);
      const [showTagWarning, setShowTagWarning] = useState(false);
      const [invalidTags, setInvalidTags] = useState([]);
      const isRunning = queueItem?.status === 'running' || queueItem?.status === 'canceling';
      const isQueued = queueItem?.status === 'queued';

      const promptRef = useRef(null);
      const tagMenuRef = useRef(null);

      useEffect(() => {
        setResult(actionResult?.result || '');
        setCostUsd(actionResult?.cost_usd || 0);
        setModelName(actionResult?.model_name || '');
        setDurationMs(actionResult?.duration_ms || 0);
        setQueryRanAt(actionResult?.ran_at || '');
      }, [actionResult]);

      useEffect(() => {
        if (!showTagMenu) return;
        const handler = (e) => {
          if (tagMenuRef.current && !tagMenuRef.current.contains(e.target)) setShowTagMenu(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showTagMenu]);

      const insertTag = (tag) => {
        const el = promptRef.current;
        const insertion = `{{${tag}}}`;
        if (!el) { setPromptTemplate(t => t + insertion); setShowTagMenu(false); return; }
        const start = el.selectionStart;
        const end = el.selectionEnd;
        const newText = promptTemplate.slice(0, start) + insertion + promptTemplate.slice(end);
        setPromptTemplate(newText);
        setShowTagMenu(false);
        requestAnimationFrame(() => { el.selectionStart = el.selectionEnd = start + insertion.length; el.focus(); });
      };

      const _knownTags = new Set(AVAILABLE_TAGS.map(t => t.tag));
      const _findInvalidTags = (template) => {
        const matches = [...template.matchAll(/\{\{(\w+)\}\}/g)];
        return [...new Set(matches.map(m => m[1]).filter(t => !_knownTags.has(t)))];
      };

      const doSave = async () => {
        const trimmed = name.trim();
        const parsedTemp = temperatureInput.trim() === '' ? null : parseFloat(temperatureInput);
        setSaving(true);
        try {
          await api.put(`/custom-actions/${action.id}`, { name: trimmed, description, prompt_template: promptTemplate, temperature: parsedTemp });
          await onUpdate();
          setEditing(false);
          setShowTagWarning(false);
        } catch (e) { setNameError(e.message); setShowTagWarning(false); }
        setSaving(false);
      };

      const handleSaveEdit = async () => {
        const trimmed = name.trim();
        if (!trimmed) { setNameError('Name is required'); return; }
        setNameError('');
        const bad = _findInvalidTags(promptTemplate);
        if (bad.length > 0) {
          setInvalidTags(bad);
          setShowTagWarning(true);
          return;
        }
        await doSave();
      };

      const handleConfirmDelete = async () => {
        setDeleting(true);
        try {
          await api.del(`/custom-actions/${action.id}`);
          onDelete(action.id);
        } catch (e) {
          alert('Error: ' + e.message);
          setDeleting(false);
          setConfirmDelete(false);
        }
      };

      const handleCustomEvent = useCallback((event) => {
        if (event.type === 'send') {
          setLiveTrace((prev) => {
            const next = prev || createLiveTrace();
            if (event.channel === 'system') return { ...next, systemPrompt: event.text || '' };
            if (event.channel === 'user') return { ...next, userPrompt: event.text || '' };
            return next;
          });
        } else if (event.type === 'receive') {
          setLiveTrace((prev) => ({ ...(prev || createLiveTrace()), response: `${(prev && prev.response) || ''}${event.text || ''}` }));
        } else if (event.type === 'rate_limit_reset') {
          setLiveTrace((prev) => ({ ...(prev || createLiveTrace()), response: '' }));
        } else if (event.type === 'complete') {
          setResult(event.result || '');
          setCostUsd(event.cost_usd || 0);
          setModelName(event.model_name || '');
          setDurationMs(event.duration_ms || 0);
          setQueryRanAt(event.query_ran_at || '');
          setLiveTrace(null);
          setLoading(false);
          onUpdate();
        } else if (event.type === 'error') {
          setError(event.message || 'Request failed');
          setErrorDetail(event.detail || '');
          setLiveTrace(null);
          setLoading(false);
        } else if (event.type === 'canceled') {
          setLiveTrace(null);
          setLoading(false);
        }
      }, [onUpdate]);

      useEffect(() => {
        if (!failedQueueItem) return;
        setError(failedQueueItem.error || 'Request failed');
        setErrorDetail(failedQueueItem.error_detail || '');
        setLiveTrace(null);
        setLoading(false);
      }, [failedQueueItem?.id]);

      useEffect(() => {
        if (!queueItem || queueItem.status !== 'running') {
          if (!queueItem) setLoading(false);
          if (queueItem?.status === 'queued') {
            setLiveTrace(null);
            setLoading(false);
          }
          return;
        }
        let canceled = false;
        setLoading(true);
        setError('');
        setErrorDetail('');
        setLiveTrace((prev) => prev || createLiveTrace());
        api.streamGet(`/queue/${queueItem.id}/events`, (event) => {
          if (!canceled && event.type !== 'heartbeat' && event.type !== 'queue_status') handleCustomEvent(event);
        }).catch((e) => {
          if (!canceled) {
            setError(e.message);
            setErrorDetail(e.detail || '');
            setLiveTrace(null);
            setLoading(false);
          }
        });
        return () => { canceled = true; };
      }, [queueItem?.id, queueItem?.status, handleCustomEvent]);

      const run = async () => {
        if (!onQueueAction) return;
        setError('');
        setErrorDetail('');
        try {
          await onQueueAction({ sectionKey: `custom:${action.id}`, title: action.name });
        } catch (e) {
          setError(e.message);
          setErrorDetail(e.detail || '');
          setLiveTrace(null);
          setLoading(false);
        }
      };
      const runButtonText = isRunning
        ? (queueItem?.status === 'canceling' ? 'Stopping AI...' : 'Stop AI')
        : isQueued
          ? "Don't Run AI"
          : hasRunningQueueItem
            ? 'Run AI Later'
            : 'Run AI';

      const costLabel = hasPositiveQueryCost(costUsd)
        ? formatQueryCost(costUsd)
        : (modelName || queryRanAt) ? 'No query cost' : '';

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
          {/* Header */}
          <div className="flex items-start justify-between mb-4 shrink-0">
            <div className="flex-1 min-w-0 mr-6">
              {editing ? (
                <>
                  <input
                    autoFocus
                    value={name}
                    onChange={(e) => { setName(e.target.value); setNameError(''); }}
                    onKeyDown={(e) => e.key === 'Escape' && setEditing(false)}
                    className={`text-2xl font-bold bg-transparent border-b-2 ${nameError ? 'border-red-500' : 'border-indigo-500'} text-white focus:outline-none w-full mb-1 pb-1`}
                    placeholder="Action name"
                  />
                  {nameError && <p className="text-xs text-red-400 mb-1">{nameError}</p>}
                </>
              ) : (
                <div className="flex items-baseline gap-3 mb-1">
                  <h2 className="text-2xl font-bold">⚡ {name}</h2>
                  <QueryCostBadge label={costLabel} details={[{ label: name, modelName, durationMs, ranAt: queryRanAt }]} />
                </div>
              )}
              {editing ? (
                <input
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                  placeholder="Short description (shown in sidebar)"
                  className="w-full px-3 py-1.5 bg-slate-900 border border-slate-700 rounded-lg text-slate-300 text-sm placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
                />
              ) : (
                <p className="text-sm text-slate-400">{description || <span className="italic text-slate-600">No description</span>}</p>
              )}
            </div>
            <div className="flex gap-2 shrink-0">
              {editing ? (
                <>
                  <button onClick={() => { setName(action.name); setDescription(action.description); setPromptTemplate(action.prompt_template || ''); setTemperatureInput(action.temperature != null ? String(action.temperature) : ''); setNameError(''); setEditing(false); }}
                    className="px-4 py-2.5 rounded-xl text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition">Cancel</button>
                  <button onClick={handleSaveEdit} disabled={saving || !name.trim()}
                    className="px-5 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 disabled:opacity-50 transition">
                    {saving ? 'Saving…' : 'Save'}
                  </button>
                </>
              ) : (
                <>
                  <button onClick={() => setEditing(true)}
                    className="px-5 py-2.5 rounded-xl text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800 transition">Edit</button>
                  <button onClick={() => setConfirmDelete(true)}
                    className="px-5 py-2.5 rounded-xl text-sm font-medium border border-red-800 bg-red-950/30 text-red-300 hover:bg-red-900/40 transition">Delete</button>
                  <button onClick={run} disabled={queueItem?.status === 'canceling' || !stateId}
                    className="px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 transition whitespace-nowrap">
                    {runButtonText}
                  </button>
                </>
              )}
            </div>
          </div>

          {/* Temperature control — always mounted, hidden when not editing */}
          <div className="mb-4 shrink-0 p-3 bg-slate-900/50 border border-slate-800 rounded-xl" style={{display: editing ? '' : 'none'}}>
            <div className="flex items-center gap-3 mb-2">
              <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide shrink-0">Temperature</label>
              <input
                type="number"
                min="0" max="2" step="0.1"
                value={temperatureInput}
                onChange={(e) => setTemperatureInput(e.target.value)}
                placeholder="API default"
                className="w-28 px-2 py-1 bg-slate-800 border border-slate-700 rounded-lg text-slate-300 text-sm placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
              />
              <span className="text-xs text-slate-500">empty = API default (~1.0)</span>
            </div>
            <div className="grid grid-cols-2 gap-x-4 gap-y-0.5 text-xs text-slate-500">
              <span><span className="font-mono text-slate-400">0.0–0.3</span> Precise / structured output</span>
              <span><span className="font-mono text-slate-400">0.7–1.0</span> Creative / conversational</span>
              <span><span className="font-mono text-slate-400">0.4–0.6</span> Balanced / research</span>
              <span><span className="font-mono text-slate-400">1.1–2.0</span> Highly random (OpenAI only)</span>
            </div>
          </div>

          {/* Edit mode: prompt template with tag insertion */}
          {editing && (
            <div className="mb-4 shrink-0">
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Prompt template</label>
                <div className="relative" ref={tagMenuRef}>
                  <button onClick={() => setShowTagMenu(v => !v)}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-indigo-400 border border-indigo-800/50 bg-indigo-950/30 rounded-lg hover:bg-indigo-900/30 transition">
                    Insert tag
                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                  </button>
                  {showTagMenu && (
                    <div className="absolute top-full right-0 z-20 mt-1 w-72 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl overflow-hidden">
                      {AVAILABLE_TAGS.map(({ tag, description: desc }) => (
                        <button key={tag} onMouseDown={(e) => e.preventDefault()} onClick={() => insertTag(tag)}
                          className="w-full text-left px-4 py-2.5 hover:bg-slate-800 transition flex items-baseline gap-3">
                          <code className="text-xs text-indigo-400 font-mono shrink-0">{`{{${tag}}}`}</code>
                          <span className="text-xs text-slate-500 truncate">{desc}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              <textarea
                ref={promptRef}
                value={promptTemplate}
                onChange={(e) => setPromptTemplate(e.target.value)}
                placeholder={"Write your prompt here.\nUse {{resume}}, {{job_posting}}, etc. to insert application context.\nExample: Analyze {{resume}} against {{job_posting}} and identify the top 3 gaps."}
                rows={10}
                className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-300 text-sm placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition resize-none font-mono"
              />
            </div>
          )}

          {/* View mode: collapsible prompt preview */}
          {!editing && action.prompt_template && (
            <details className="mb-4 shrink-0 group">
              <summary className="text-xs text-slate-500 cursor-pointer select-none hover:text-slate-300 transition flex items-center gap-1.5">
                <svg className="w-3 h-3 transition-transform group-open:rotate-90 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                Prompt template
              </summary>
              <pre className="mt-2 px-4 py-3 bg-slate-900/60 border border-slate-800 rounded-xl text-xs text-slate-400 font-mono whitespace-pre-wrap overflow-auto max-h-48">{action.prompt_template}</pre>
            </details>
          )}
          {!editing && action.temperature != null && (
            <div className="mb-4 shrink-0">
              <span className="text-xs text-slate-500">Temperature: </span>
              <span className="text-xs font-mono text-slate-400">{action.temperature}</span>
            </div>
          )}

          {isRunning && liveTrace ? (
            <div className="overflow-y-auto flex-1 min-h-0">
              {loading && <BookResearchAnimation label={`${name} agent is working…`} />}
              <LiveTracePanel trace={liveTrace} title={`${name} — Live Trace`} />
            </div>
          ) : (
            <>
              {error && <ErrorBlock message={error} detail={errorDetail} />}
              {result ? (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 overflow-y-auto flex-1 min-h-0">
                  <Markdown text={result} />
                </div>
              ) : !loading && !editing && (
                <div className="bg-slate-900/50 border border-slate-800 rounded-xl p-8 text-center flex-1 flex items-center justify-center">
                  <div>
                    {action.prompt_template ? (
                      <>
                        <p className="text-slate-400 mb-1">Ready to run.</p>
                        <p className="text-slate-500 text-sm">Click <strong className="text-slate-300">Run AI</strong> to execute{stateId ? ' with the current application context' : ''}.</p>
                      </>
                    ) : (
                      <>
                        <p className="text-slate-400 mb-1">Click <strong className="text-slate-300">Edit</strong> to set up this action.</p>
                        <p className="text-slate-500 text-sm">Add a prompt template — use <code className="text-indigo-400 text-xs font-mono">{'{{tags}}'}</code> to insert resume, job posting, and other context.</p>
                      </>
                    )}
                  </div>
                </div>
              )}
            </>
          )}

          {showTagWarning && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-amber-800/50 bg-slate-900 p-6 shadow-2xl">
                <div className="flex items-start gap-3 mb-3">
                  <span className="text-amber-400 text-xl shrink-0">⚠</span>
                  <div>
                    <h3 className="text-base font-semibold text-white mb-1">Unknown tag{invalidTags.length > 1 ? 's' : ''} in prompt</h3>
                    <p className="text-sm text-slate-400">
                      The following tag{invalidTags.length > 1 ? 's are' : ' is'} not recognised and will be sent to the AI literally:
                    </p>
                    <div className="flex flex-wrap gap-1.5 mt-2">
                      {invalidTags.map(t => (
                        <code key={t} className="px-2 py-0.5 rounded bg-amber-950/50 border border-amber-800/50 text-amber-300 text-xs font-mono">{`{{${t}}}`}</code>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="flex justify-end gap-3 mt-5">
                  <button onClick={() => setShowTagWarning(false)}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition text-sm">
                    Go back and correct
                  </button>
                  <button onClick={doSave} disabled={saving}
                    className="px-4 py-2 rounded-lg bg-amber-700 hover:bg-amber-600 text-white disabled:opacity-50 transition text-sm font-medium">
                    {saving ? 'Saving…' : 'Save anyway'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {confirmDelete && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-2xl">
                <h3 className="text-lg font-semibold text-white mb-2">Delete custom action?</h3>
                <p className="text-sm text-slate-400 mb-6">
                  <span className="text-slate-300 font-medium">"{name}"</span> will be permanently removed. This cannot be undone.
                </p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setConfirmDelete(false)} disabled={deleting}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 disabled:opacity-50 transition">Cancel</button>
                  <button onClick={handleConfirmDelete} disabled={deleting}
                    className="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 disabled:opacity-50 transition">
                    {deleting ? 'Deleting…' : 'Delete'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── About ────────────────────────────────────────────────────────────────
    function AboutStep({ appVersion = '' }) {
      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8 max-w-2xl">
          <div className="flex items-baseline gap-3 mb-1 shrink-0">
            <h2 className="text-2xl font-bold">Interview Flow</h2>
            {appVersion && <span className="text-sm text-slate-500 font-mono">v{appVersion}</span>}
          </div>
          <p className="text-slate-400 mb-8 shrink-0">AI-powered interview coaching — research, prep, practice, and debrief in one place.</p>

          <div className="space-y-6 overflow-y-auto flex-1 min-h-0">
            <section>
              <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">What it does</h3>
              <ul className="space-y-2 text-sm text-slate-300">
                {[
                  ['📄', 'Resume', 'Upload or paste your resume; pick from a saved resume library across sessions'],
                  ['🔍', 'Research', 'Deep-dives a company using live web search — culture, tech stack, red flags, fit score'],
                  ['🕵️', 'Interview Intel', 'Mines Glassdoor, Blind, Reddit, and Levels.fyi for real interview questions and process details'],
                  ['🔬', 'Job Decoder', 'Reads between the lines of a job posting across six analytical lenses'],
                  ['✏️', 'Resume Tailor', 'Reviews your resume against the JD, produces a structured rewrite exportable as a .docx, and provides an interactive chat coach'],
                  ['📖', 'Story Bank', 'Extracts STAR stories from your resume with earned-secret insights'],
                  ['🎯', 'Pitch', 'Builds 10s / 30s / 60s / 90s pitch variants for the specific role'],
                  ['🛡️', 'Concerns', 'Anticipates interviewer objections and prepares counter-evidence'],
                  ['🎙️', 'Mock Interview', 'Runs a full interview simulation with scoring and a debrief'],
                  ['💰', 'Salary', 'Researches comp ranges and generates negotiation scripts'],
                  ['⚡', 'Custom Actions', 'User-defined AI steps with access to all application context via template tags'],
                ].map(([icon, label, desc]) => (
                  <li key={label} className="flex gap-3">
                    <span className="shrink-0 w-5 text-center">{icon}</span>
                    <span><strong className="text-slate-200">{label}</strong> — {desc}</span>
                  </li>
                ))}
              </ul>
            </section>

            <section>
              <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Source</h3>
              <p className="text-sm text-slate-400 leading-6">
                Open source at{' '}
                <a
                  href="https://github.com/loxsmoke/interview-flow"
                  target="_blank"
                  rel="noreferrer"
                  className="text-indigo-300 hover:text-indigo-200 underline underline-offset-4"
                >
                  loxsmoke/interview-flow
                </a>.
              </p>
            </section>

            <section>
              <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">Built with</h3>
              <ul className="space-y-1 text-sm text-slate-400">
                <li><span className="text-slate-300 font-medium">Backend</span> — Python · FastAPI · Pydantic</li>
                <li><span className="text-slate-300 font-medium">Frontend</span> — React · Tailwind CSS · Mermaid</li>
                <li><span className="text-slate-300 font-medium">AI</span> — Anthropic Claude · OpenAI · Ollama (local)</li>
                <li><span className="text-slate-300 font-medium">Agent SDK</span> — claude-agent-sdk with WebSearch · WebFetch tools</li>
              </ul>
            </section>
          </div>
        </div>
      );
    }

    // ── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [stateId, setStateId] = useState('');
      const [currentStep, setCurrentStep] = useState('setup');
      const [completedSteps, setCompletedSteps] = useState([]);
      const [existingStates, setExistingStates] = useState([]);
      const [stateData, setStateData] = useState(null);
      const [isTech, setIsTech] = useState(false);
      const [needsConfig, setNeedsConfig] = useState(false);
      const [customActions, setCustomActions] = useState([]);
      const [showNewActionDialog, setShowNewActionDialog] = useState(false);
      const [newActionName, setNewActionName] = useState('');
      const [newActionError, setNewActionError] = useState('');
      const [queueStatus, setQueueStatus] = useState({ running: null, queued: [], failed: [] });
      const [appVersion, setAppVersion] = useState('');
      const [activeProvider, setActiveProvider] = useState('');
      const [activeModel, setActiveModel] = useState('');
      const totalQueryDetails = [
        {
          label: 'Company Research',
          costUsd: stateData?.research?.query_cost_usd,
          modelName: stateData?.research?.query_model_name,
          durationMs: stateData?.research?.query_duration_ms,
          ranAt: stateData?.research?.query_ran_at || stateData?.research?.researched_at,
        },
        {
          label: 'Interview Intel',
          costUsd: stateData?.interview_intel?.query_cost_usd,
          modelName: stateData?.interview_intel?.query_model_name,
          durationMs: stateData?.interview_intel?.query_duration_ms,
          ranAt: stateData?.interview_intel?.query_ran_at,
        },
        {
          label: 'Job Decoder',
          costUsd: stateData?.jd_analysis?.query_cost_usd,
          modelName: stateData?.jd_analysis?.query_model_name,
          durationMs: stateData?.jd_analysis?.query_duration_ms,
          ranAt: stateData?.jd_analysis?.query_ran_at,
        },
        {
          label: 'Story Mining',
          costUsd: stateData?.stories_cost_usd,
          modelName: stateData?.stories_model_name,
          durationMs: stateData?.stories_duration_ms,
          ranAt: stateData?.stories_ran_at,
        },
        {
          label: 'Resume Tailor',
          costUsd: stateData?.resume_review_cost_usd,
          modelName: stateData?.resume_review_model_name,
          durationMs: stateData?.resume_review_duration_ms,
          ranAt: stateData?.resume_review_ran_at,
        },
        {
          label: 'Pitch Builder',
          costUsd: stateData?.pitch?.query_cost_usd,
          modelName: stateData?.pitch?.query_model_name,
          durationMs: stateData?.pitch?.query_duration_ms,
          ranAt: stateData?.pitch?.query_ran_at,
        },
        {
          label: 'Interviewer Concerns',
          costUsd: stateData?.concerns_cost_usd,
          modelName: stateData?.concerns_model_name,
          durationMs: stateData?.concerns_duration_ms,
          ranAt: stateData?.concerns_ran_at,
        },
        {
          label: 'Salary Coaching',
          costUsd: stateData?.comp_data?.query_cost_usd,
          modelName: stateData?.comp_data?.query_model_name,
          durationMs: stateData?.comp_data?.query_duration_ms,
          ranAt: stateData?.comp_data?.query_ran_at,
        },
        ...Object.entries(stateData?.custom_action_results || {}).map(([actionName, r]) => ({
          label: actionName,
          costUsd: r.cost_usd,
          modelName: r.model_name,
          durationMs: r.duration_ms,
          ranAt: r.ran_at,
        })),
      ].filter((detail) => detail.ranAt || detail.modelName);
      const paidCostLabel = formatTotalQueryCost(totalQueryDetails.map((detail) => detail.costUsd));
      const totalQueryCostLabel = totalQueryDetails.length === 0 ? '' : (paidCostLabel || 'No query cost');
      const totalQueryTooltip = formatDebriefQueryTooltip(totalQueryDetails);

      useEffect(() => {
        api.get('/states').then(setExistingStates).catch(() => {});
        api.get('/custom-actions').then(d => setCustomActions(d.actions || [])).catch(() => {});
      }, []);

      const refreshQueue = useCallback(async () => {
        try {
          const queue = await api.get('/queue');
          setQueueStatus(queue || { running: null, queued: [], failed: [] });
          return queue;
        } catch {
          return null;
        }
      }, []);

      useEffect(() => {
        let canceled = false;
        refreshQueue();
        api.streamGet('/queue/stream', (event) => {
          if (!canceled && event.type === 'queue') {
            setQueueStatus(event.queue || { running: null, queued: [], failed: [] });
          }
        }).catch(() => {});
        return () => { canceled = true; };
      }, [refreshQueue]);

      const refreshCustomActions = useCallback(async () => {
        try {
          const d = await api.get('/custom-actions');
          setCustomActions(d.actions || []);
        } catch {}
      }, []);

      const checkConfig = useCallback(() => {
        api.get('/config').then(cfg => {
          if (cfg.version) setAppVersion(cfg.version);
          const configured = cfg.anthropic_api_key_set || !!cfg.openai_api_key || !!cfg.gemini_api_key_set || !!(cfg.ollama_base_url && cfg.ollama_model);
          setNeedsConfig(!configured);
          const provider = cfg.active_provider || '';
          setActiveProvider(provider);
          if (provider === 'anthropic') setActiveModel(cfg.anthropic_model || '');
          else if (provider === 'openai') setActiveModel(cfg.openai_model || '');
          else if (provider === 'gemini') setActiveModel(cfg.gemini_model || '');
          else if (provider === 'ollama') setActiveModel(cfg.ollama_model || '');
          else setActiveModel('');
          if (!configured) {
            setCurrentStep('config');
          } else {
            setCurrentStep(prev => prev === 'config' ? 'setup' : prev);
          }
        }).catch(() => {});
      }, []);

      useEffect(() => { checkConfig(); }, []);

      const titleCompany = (stateData && stateData.company_name) || '';
      const titlePosition = (stateData && stateData.position) || '';
      useEffect(() => {
        const appName = appVersion ? `Interview Flow v${appVersion}` : 'Interview Flow';
        const parts = [titleCompany, titlePosition].filter(Boolean).join(' — ');
        document.title = parts ? `${parts} | ${appName}` : appName;
      }, [titleCompany, titlePosition, appVersion]);

      const refreshState = useCallback(async (id = stateId) => {
        if (!id) return null;
        const data = await api.get(`/state/${id}`);
        setCompletedSteps(data.completed_steps || []);
        setStateData(data);
        setIsTech(isTechnicalRole(data.position));
        return data;
      }, [stateId]);

      const queueItemFor = useCallback((sectionKey, id = stateId) => {
        if (!id || !sectionKey) return null;
        const allItems = [
          queueStatus.running,
          ...(queueStatus.queued || []),
        ].filter(Boolean);
        return allItems.find((item) => item.state_id === id && item.section_key === sectionKey) || null;
      }, [queueStatus, stateId]);

      const failedQueueItemFor = useCallback((sectionKey, id = stateId) => {
        if (!id || !sectionKey) return null;
        return (queueStatus.failed || []).find((item) => item.state_id === id && item.section_key === sectionKey) || null;
      }, [queueStatus, stateId]);

      const handleQueueAction = useCallback(async ({ sectionKey, title }) => {
        if (!stateId || !sectionKey) return;
        const item = queueItemFor(sectionKey);
        if (item?.status === 'queued') {
          await api.del(`/queue/${item.id}`);
        } else if (item?.status === 'running' || item?.status === 'canceling') {
          await api.post(`/queue/${item.id}/cancel`, {});
        } else {
          await api.post('/queue', { state_id: stateId, section_key: sectionKey, title });
        }
        await refreshQueue();
      }, [stateId, queueItemFor, refreshQueue]);

      const loadState = async (id) => {
        const data = await refreshState(id);
        setStateId(id);
        if (data) setCurrentStep(data.current_step || 'setup');
      };

      const loadStateForSetup = async (id) => {
        await refreshState(id);
        setStateId(id);
        // Stay on setup page regardless of the state's current_step
      };

      const onSetup = async (state) => {
        setStateId(state.id);
        setStateData(state);
        setCompletedSteps(state.completed_steps || ['setup']);
        setIsTech(isTechnicalRole(state.position));
        setCurrentStep('resume');
        setExistingStates(prev => {
          const idx = prev.findIndex(s => s.id === state.id);
          if (idx === -1) return prev;
          const next = [...prev];
          next[idx] = { ...next[idx], company_name: state.company_name, position: state.position };
          return next;
        });
      };

      const deleteState = async (id) => {
        await api.del(`/state/${id}`);
        setExistingStates(prev => prev.filter(s => s.id !== id));
        if (stateId === id) {
          setStateId('');
          setStateData(null);
          setCompletedSteps([]);
          setCurrentStep('setup');
        }
      };

      const cloneState = async (id) => {
        const cloned = await api.post(`/state/${id}/clone`, {});
        setExistingStates(prev => {
          const idx = prev.findIndex(s => s.id === id);
          const next = [...prev];
          next.splice(idx + 1, 0, cloned);
          return next;
        });
      };

      const newApplication = () => {
        setStateId('');
        setStateData(null);
        setCompletedSteps([]);
        setCurrentStep('setup');
      };

      const addCustomAction = () => {
        setNewActionName('');
        setNewActionError('');
        setShowNewActionDialog(true);
      };

      const handleCreateAction = async () => {
        const name = newActionName.trim();
        if (!name) { setNewActionError('Name is required'); return; }
        try {
          const data = await api.post('/custom-actions', { name });
          setShowNewActionDialog(false);
          setNewActionName('');
          setNewActionError('');
          await refreshCustomActions();
          setCurrentStep(`custom_${data.action.id}`);
        } catch (e) { setNewActionError(e.message); }
      };

      // Refresh state after agent runs (to update completedSteps)
      useEffect(() => {
        if (!stateId) return;
        const interval = setInterval(async () => {
          try {
            await refreshState(stateId);
          } catch {}
        }, 5000);
        return () => clearInterval(interval);
      }, [stateId, refreshState]);

      const renderStep = () => {
        if (currentStep === 'about') return <AboutStep appVersion={appVersion} />;
        if (currentStep === 'config') return <AppConfigStep onSaved={checkConfig} />;
        if (currentStep.startsWith('custom_')) {
          const actionId = currentStep.slice(7);
          const action = customActions.find(a => a.id === actionId);
          if (!action) return <div className="text-slate-400 p-8">Custom action not found.</div>;
          const actionResult = stateData?.custom_action_results?.[action.name] || null;
          return <CustomActionStep
            key={`custom_${actionId}`}
            stateId={stateId}
            action={action}
            actionResult={actionResult}
            onDelete={async () => { await refreshCustomActions(); setCurrentStep('setup'); }}
            onUpdate={async () => { await refreshCustomActions(); if (stateId) await refreshState(stateId); }}
            queueItem={queueItemFor(`custom:${actionId}`)}
            failedQueueItem={failedQueueItemFor(`custom:${actionId}`)}
            hasRunningQueueItem={!!queueStatus.running}
            onQueueAction={handleQueueAction}
          />;
        }
        if (!stateId || currentStep === 'setup') {
          return <SetupStep
            key={`setup-${stateId || 'new'}`}
            onSetup={onSetup}
            existingStates={existingStates}
            onLoadState={loadStateForSetup}
            onDeleteState={deleteState}
            onCloneState={cloneState}
            onNewApplication={newApplication}
            loadedStateId={stateId}
            initialJobPosting={stateData?.job_posting}
            initialResume={stateData?.resume}
            initialResumeRaw={stateData?.resume_raw}
            initialCompanyName={stateData?.company_name}
            initialPosition={stateData?.position}
            onTechChange={setIsTech}
            activeProvider={activeProvider}
            activeModel={activeModel}
          />;
        }
        const stepIds = STEPS.map(s => s.id);
        const currentIdx = stepIds.indexOf(currentStep);
        const nextStepId = currentIdx >= 0 && currentIdx < stepIds.length - 1 ? stepIds[currentIdx + 1] : null;
        const onContinue = nextStepId ? () => setCurrentStep(nextStepId) : undefined;
        switch (currentStep) {
          case 'resume':
            return <ResumeStep key={`resume-${stateId}`} stateId={stateId} currentResume={stateData?.resume} currentResumeRaw={stateData?.resume_raw} currentResumeTagged={stateData?.resume_tagged} savedResumes={stateData?.resumes || []} onResumeUpdate={() => refreshState(stateId)} onContinue={onContinue} />;
          case 'research':
            return <AgentStep key={`research-${stateId}`} stateId={stateId} stepId="research" title="Company Research" description="AI agent deep-dives into the company: business model, leadership, culture, tech stack, challenges, and reputation." endpoint="research" resultKey="report" cached={stateData?.research?.raw_report} queryMeta={{ costUsd: stateData?.research?.query_cost_usd, modelName: stateData?.research?.query_model_name, durationMs: stateData?.research?.query_duration_ms, ranAt: stateData?.research?.query_ran_at || stateData?.research?.researched_at }} onComplete={refreshState} onContinue={onContinue} usesWebSearch={true} queueItem={queueItemFor('research')} failedQueueItem={failedQueueItemFor('research')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'interview_intel':
            return <AgentStep key={`interview_intel-${stateId}`} stateId={stateId} stepId="interview_intel" title="Interview Intel" description="Mines Glassdoor, Blind, Reddit, and Levels.fyi for real interview questions, hiring patterns, and candidate experiences at this company." endpoint="interview-intel" resultKey="report" cached={stateData?.interview_intel?.raw_report} queryMeta={{ costUsd: stateData?.interview_intel?.query_cost_usd, modelName: stateData?.interview_intel?.query_model_name, durationMs: stateData?.interview_intel?.query_duration_ms, ranAt: stateData?.interview_intel?.query_ran_at }} onComplete={refreshState} onContinue={onContinue} usesWebSearch={true} queueItem={queueItemFor('interview_intel')} failedQueueItem={failedQueueItemFor('interview_intel')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'jd_decode':
            return <AgentStep key={`jd_decode-${stateId}`} stateId={stateId} stepId="jd_decode" title="Job Decoder" description="Analyzes the job description through six lenses: repetition, emphasis, requirements, verb choices, hidden signals, and what's missing." endpoint="decode-jd" resultKey="analysis" cached={stateData?.jd_analysis?.raw_analysis} queryMeta={{ costUsd: stateData?.jd_analysis?.query_cost_usd, modelName: stateData?.jd_analysis?.query_model_name, durationMs: stateData?.jd_analysis?.query_duration_ms, ranAt: stateData?.jd_analysis?.query_ran_at }} onComplete={refreshState} onContinue={onContinue} queueItem={queueItemFor('jd_decode')} failedQueueItem={failedQueueItemFor('jd_decode')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'resume_tailor':
            return <ResumeTailorStep key={`resume_tailor-${stateId}`} stateId={stateId} cached={stateData?.resume_review} queryMeta={{ costUsd: stateData?.resume_review_cost_usd, modelName: stateData?.resume_review_model_name, durationMs: stateData?.resume_review_duration_ms, ranAt: stateData?.resume_review_ran_at }} currentResume={stateData?.resume} currentResumeTagged={stateData?.resume_tagged} companyName={stateData?.company_name} onComplete={refreshState} onContinue={onContinue} queueItem={queueItemFor('resume_tailor')} failedQueueItem={failedQueueItemFor('resume_tailor')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'stories':
            return <StoryBankStep stateId={stateId} queryMeta={{ costUsd: stateData?.stories_cost_usd, modelName: stateData?.stories_model_name, durationMs: stateData?.stories_duration_ms, ranAt: stateData?.stories_ran_at }} onComplete={refreshState} onContinue={onContinue} queueItem={queueItemFor('stories')} failedQueueItem={failedQueueItemFor('stories')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'pitch':
            return <AgentStep key={`pitch-${stateId}`} stateId={stateId} stepId="pitch" title="Pitch Builder" description="Builds your positioning statement and pitch variants: 10s elevator, 30s networking, 60s recruiter, and 90s interview." endpoint="pitch" resultKey="pitches" cached={stateData?.pitch?.value_proposition} queryMeta={{ costUsd: stateData?.pitch?.query_cost_usd, modelName: stateData?.pitch?.query_model_name, durationMs: stateData?.pitch?.query_duration_ms, ranAt: stateData?.pitch?.query_ran_at }} onComplete={refreshState} onContinue={onContinue} queueItem={queueItemFor('pitch')} failedQueueItem={failedQueueItemFor('pitch')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'concerns':
            return <AgentStep key={`concerns-${stateId}`} stateId={stateId} stepId="concerns" title="Interviewer Concerns" description="Anticipates what the interviewer might worry about and prepares counter-evidence and reframe scripts." endpoint="concerns" resultKey="analysis" cached={stateData?.concerns_analysis} queryMeta={{ costUsd: stateData?.concerns_cost_usd, modelName: stateData?.concerns_model_name, durationMs: stateData?.concerns_duration_ms, ranAt: stateData?.concerns_ran_at }} onComplete={refreshState} onContinue={onContinue} queueItem={queueItemFor('concerns')} failedQueueItem={failedQueueItemFor('concerns')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'mock_interview':
            return <MockInterviewStep stateId={stateId} onContinue={onContinue} />;
          case 'salary':
            return <AgentStep key={`salary-${stateId}`} stateId={stateId} stepId="salary" title="Salary Coaching" description="Compensation negotiation coaching with market data, range construction, and exact scripts for every stage." endpoint="salary" resultKey="analysis" cached={stateData?.comp_data?.raw_analysis} queryMeta={{ costUsd: stateData?.comp_data?.query_cost_usd, modelName: stateData?.comp_data?.query_model_name, durationMs: stateData?.comp_data?.query_duration_ms, ranAt: stateData?.comp_data?.query_ran_at }} onComplete={refreshState} onContinue={onContinue} usesWebSearch={true} queueItem={queueItemFor('salary')} failedQueueItem={failedQueueItemFor('salary')} hasRunningQueueItem={!!queueStatus.running} onQueueAction={handleQueueAction} queueStatus={queueStatus} />;
          case 'debrief':
            return <DebriefStep stateId={stateId} totalQueryCostLabel={totalQueryCostLabel} totalQueryDetails={totalQueryDetails} totalQueryTooltip={totalQueryTooltip} />;
          case 'config':
            return <AppConfigStep onSaved={checkConfig} />;
          default:
            return <div className="text-slate-400">Select a step from the sidebar.</div>;
        }
      };

      return (
        <div className="flex h-screen overflow-hidden">
          <Sidebar
            currentStep={currentStep}
            completedSteps={completedSteps}
            onStepClick={setCurrentStep}
            onAboutClick={() => setCurrentStep('about')}
            onConfigClick={() => setCurrentStep('config')}
            stateId={stateId}
            selectedCompanyName={stateData?.company_name}
            needsConfig={needsConfig}
            customActions={customActions}
            onAddCustomAction={addCustomAction}
            queueStatus={queueStatus}
            isTech={isTech}
          />
          <main className="flex-1 py-8 pl-8 flex flex-col overflow-hidden">
            {renderStep()}
          </main>

          {showNewActionDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-2xl">
                <h3 className="text-lg font-semibold text-white mb-1">New custom action</h3>
                <p className="text-sm text-slate-500 mb-4">Give it a unique name. You can add the prompt after.</p>
                <input
                  autoFocus
                  value={newActionName}
                  onChange={(e) => { setNewActionName(e.target.value); setNewActionError(''); }}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleCreateAction(); if (e.key === 'Escape') setShowNewActionDialog(false); }}
                  placeholder="e.g. Cover letter draft"
                  className="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"
                />
                {newActionError && <p className="text-xs text-red-400 mt-2">{newActionError}</p>}
                <div className="flex justify-end gap-3 mt-5">
                  <button onClick={() => setShowNewActionDialog(false)}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition">Cancel</button>
                  <button onClick={handleCreateAction} disabled={!newActionName.trim()}
                    className="px-5 py-2 rounded-lg font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 transition">Create</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

  <style>

<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── API Client ──────────────────────────────────────────────────────────
    const api = {
      async post(path, body = {}) {
        const res = await fetch(`/api${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'Request failed');
        }
        return res.json();
      },
      async get(path) {
        const res = await fetch(`/api${path}`);
        if (!res.ok) throw new Error('Request failed');
        return res.json();
      },
      async put(path, body = {}) {
        const res = await fetch(`/api${path}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'Request failed');
        }
        return res.json();
      },
      async del(path) {
        const res = await fetch(`/api${path}`, { method: 'DELETE' });
        return res.json();
      },
      async stream(path, body = {}, onEvent) {
        const res = await fetch(`/api${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'Request failed');
        }
        if (!res.body) {
          throw new Error('Streaming is not supported by this browser');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        const handleEvent = (event) => {
          if (onEvent) onEvent(event);
          if (event.type === 'error') {
            const err = new Error(event.message || 'Request failed');
            err.detail = event.detail || '';
            throw err;
          }
        };

        try {
          while (true) {
            const { value, done } = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed) continue;
              handleEvent(JSON.parse(trimmed));
            }

            if (done) break;
          }

          const trimmed = buffer.trim();
          if (trimmed) {
            handleEvent(JSON.parse(trimmed));
          }
        } finally {
          reader.releaseLock();
        }
      },
      async streamGet(path, onEvent) {
        const res = await fetch(`/api${path}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || 'Request failed');
        }
        if (!res.body) throw new Error('Streaming is not supported by this browser');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        try {
          while (true) {
            const { value, done } = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed) continue;
              if (onEvent) onEvent(JSON.parse(trimmed));
            }
            if (done) break;
          }
          const trimmed = buffer.trim();
          if (trimmed && onEvent) onEvent(JSON.parse(trimmed));
        } finally {
          reader.releaseLock();
        }
      },
    };

    // ── Markdown Renderer (with Mermaid diagram support) ─────────────────
    function Markdown({ text }) {
      const containerRef = useRef(null);
      if (!text) return null;

      const raw = marked.parse(text || '', { breaks: true });
      // Allow class attributes so mermaid code blocks retain "language-mermaid"
      const html = DOMPurify.sanitize(raw, { ADD_ATTR: ['class'] });

      useEffect(() => {
        if (!containerRef.current) return;
        const codeBlocks = containerRef.current.querySelectorAll('code.language-mermaid');
        codeBlocks.forEach(async (block, i) => {
          // textContent already gives us unescaped text (no &gt; etc.)
          // but DOMPurify may have mangled the content — decode any remaining entities
          const tmp = document.createElement('textarea');
          tmp.innerHTML = block.innerHTML;
          let definition = tmp.value.trim();
          // Strip Mermaid markdown-string labels (backtick-quoted) because Mermaid 11.x
          // renders "Unsupported markdown: list" literally when bullet lists appear inside
          // them. Handles both ["`...`"] (quoted) and [`...`] (unquoted) forms.
          definition = definition.replace(/\["?`([\s\S]*?)`"?\]/g, (_, inner) => {
            const lines = inner.split('\n')
              .map(l => l.replace(/^\s*[-*\d]+\.?\s*/, '').trim())
              .filter(Boolean);
            return `["${lines.join('\\n')}"]`;
          });
          // Reorient `graph TD` to `graph LR` for better readability — LR uses the full
          // viewport width and keeps node labels wider. `flowchart TD` is left alone
          // because salary-coach decision trees are intentionally top-down.
          definition = definition.replace(/^(graph)\s+TD\b/m, '$1 LR');
          // Normalize line breaks: replace literal \n sequences and <br/> variants with <br/>
          // so Mermaid's htmlLabels rendering splits them into actual line breaks.
          definition = definition.replace(/\\n/g, '<br/>');
          definition = definition.replace(/<br\s*\/?>/gi, '<br/>');
          const pre = block.parentElement;

          // Fix truncated diagrams: close any unclosed subgraphs/brackets
          const opens = (definition.match(/\bsubgraph\b/g) || []).length;
          const closes = (definition.match(/\bend\b/g) || []).length;
          for (let j = 0; j < opens - closes; j++) definition += '\n    end';

          try {
            const { svg } = await mermaid.render(`mermaid-${Date.now()}-${i}`, definition);
            const wrapper = document.createElement('div');
            wrapper.className = 'mermaid-diagram my-4 overflow-x-auto';
            // Use the HTML parser (not XML/SVG) so <foreignObject> content with HTML
            // elements (<div>, <br>) is handled correctly. DOMParser('image/svg+xml')
            // rejects HTML-in-foreignObject as invalid XML, leaving a parsererror document.
            const tmp2 = document.createElement('div');
            tmp2.innerHTML = svg;
            const svgNode = tmp2.querySelector('svg');

            if (svgNode) {
              wrapper.replaceChildren(svgNode);
            } else {
              throw new Error('Mermaid render did not return SVG');
            }
            pre.replaceWith(wrapper);
          } catch (err) {
            // On failure, show the code block as-is with a subtle label
            console.warn('Mermaid render failed:', err);
            pre.style.opacity = '0.8';
          }
        });
      }, [text]);

      return <div ref={containerRef} className="prose text-slate-300" dangerouslySetInnerHTML={{ __html: html }} />;
    }

    // ── Loading Indicator ───────────────────────────────────────────────────
    function LoadingDots({ label }) {
      return (
        <div className="flex items-center gap-2 text-slate-400 py-4">
          <div className="flex gap-1">
            <span className="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
            <span className="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
            <span className="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
          </div>
          <span className="text-sm">{label || 'Agent is working...'}</span>
        </div>
      );
    }

    // ── Book Research Animation ─────────────────────────────────────────────
    const BRA_COLORS = ['#f5f0e8','#e8f0f5','#edf5e8','#f5ebe8','#f0e8f5','#f5f5e0'];
    const BRA_LINE   = '#b8a890';
    const BRA_SPINE  = '#7c6a4f';

    function BookShape({ x, color }) {
      return (
        <g transform={`translate(${x},40)`}>
          <rect x="-29" y="-23" width="28" height="46" rx="2" fill={color} stroke={BRA_SPINE} strokeWidth="1"/>
          <rect x="1"   y="-23" width="28" height="46" rx="2" fill={color} stroke={BRA_SPINE} strokeWidth="1"/>
          <line x1="-25" y1="-14" x2="-4"  y2="-14" stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="-25" y1="-7"  x2="-4"  y2="-7"  stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="-25" y1="0"   x2="-4"  y2="0"   stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="-25" y1="7"   x2="-4"  y2="7"   stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="-25" y1="14"  x2="-14" y2="14"  stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="4"  y1="-14" x2="25"  y2="-14" stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="4"  y1="-7"  x2="25"  y2="-7"  stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="4"  y1="0"   x2="25"  y2="0"   stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="4"  y1="7"   x2="25"  y2="7"   stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="4"  y1="14"  x2="15"  y2="14"  stroke={BRA_LINE} strokeWidth="1.2"/>
          <line x1="0"  y1="-24" x2="0"   y2="24"  stroke={BRA_SPINE} strokeWidth="2"/>
        </g>
      );
    }

    function BookResearchAnimation({ label }) {
      const N = 6, spacing = 80;
      const books = [];
      for (let pass = 0; pass < 2; pass++)
        for (let i = 0; i < N; i++)
          books.push(<BookShape key={`${pass}-${i}`} x={pass * N * spacing + i * spacing + spacing / 2} color={BRA_COLORS[i % BRA_COLORS.length]} />);
      return (
        <div className="flex flex-col items-center gap-3 py-6">
          <svg width="320" height="80" style={{overflow:'hidden',display:'block'}}>
            <defs>
              <clipPath id="bra-clip">
                <rect x="0" y="0" width="320" height="80"/>
              </clipPath>
            </defs>
            <g clipPath="url(#bra-clip)">
              <g className="bra-scroll">{books}</g>
            </g>
            {/* Magnifying glass — fixed at centre */}
            <g transform="translate(160,40)">
              <circle cx="2"  cy="3"  r="27" fill="rgba(0,0,0,0.25)"/>
              <circle cx="0"  cy="0"  r="27" fill="rgba(148,210,255,0.07)" stroke="#94a3b8" strokeWidth="2.5"/>
              <ellipse cx="-9" cy="-9" rx="7" ry="4" fill="rgba(255,255,255,0.14)" transform="rotate(-30,-9,-9)"/>
              <line x1="20" y1="21" x2="32" y2="33" stroke="rgba(0,0,0,0.25)" strokeWidth="6"   strokeLinecap="round"/>
              <line x1="19" y1="19" x2="31" y2="31" stroke="#475569"          strokeWidth="5"   strokeLinecap="round"/>
              <line x1="19" y1="19" x2="31" y2="31" stroke="#94a3b8"          strokeWidth="2.5" strokeLinecap="round"/>
            </g>
          </svg>
          {label && <p className="text-slate-400 text-sm text-center">{label}</p>}
        </div>
      );
    }

    // ── Workflow Steps Config ───────────────────────────────────────────────
    const STEPS = [
      { id: 'setup', label: 'Setup', icon: '📋', desc: 'Upload job posting' },
      { id: 'resume', label: 'Resume', icon: '📄', desc: 'Upload or select resume', resumeBadge: true },
      { id: 'research', label: 'Research', icon: '🔍', desc: 'Deep-dive company analysis', webSearch: true },
      { id: 'interview_intel', label: 'Interview Intel', icon: '🕵️', desc: 'Real questions & interview patterns', webSearch: true },
      { id: 'jd_decode', label: 'Job Decoder', icon: '🔬', desc: 'Six-lens deep read of the job posting' },
      { id: 'resume_tailor', label: 'Resume Tailor', icon: '✏️', desc: 'Tailor resume to the JD', needsResume: true },
      { id: 'stories', label: 'Story Bank', icon: '📖', desc: 'Mine & manage your stories', needsResume: true },
      { id: 'pitch', label: 'Pitch', icon: '🎯', desc: 'Build your positioning', needsResume: true },
      { id: 'concerns', label: 'Concerns', icon: '🛡️', desc: 'Anticipate objections', needsResume: true },
      { id: 'mock_interview', label: 'Mock Interview', icon: '🎙️', desc: 'Practice with AI interviewer', needsResume: true },
      { id: 'salary', label: 'Salary', icon: '💰', desc: 'Comp negotiation coaching', webSearch: true },
      { id: 'debrief', label: 'Debrief', icon: '📝', desc: 'Post-interview reflection' },
    ];

    const AVAILABLE_TAGS = [
      { tag: 'resume',         description: 'Candidate resume text' },
      { tag: 'job_posting',    description: 'Job posting / description' },
      { tag: 'company_name',   description: 'Company name' },
      { tag: 'position',       description: 'Position / role title' },
      { tag: 'research',       description: 'Company research report' },
      { tag: 'jd_analysis',    description: 'Job description analysis' },
      { tag: 'stories',        description: 'Story bank (STAR stories)' },
      { tag: 'pitch',          description: 'Interview pitch variants' },
      { tag: 'concerns',       description: 'Interviewer concerns analysis' },
      { tag: 'interview_intel',description: 'Interview process intel' },
      { tag: 'comp_data',      description: 'Salary & compensation data' },
    ];

    // ── Data Migration Modal ─────────────────────────────────────────────────
    function MigrationModal({ fromDir, toDir, onSuccess, onCancel }) {
      const [phase, setPhase] = useState('confirm');
      const [migratedFiles, setMigratedFiles] = useState([]);
      const [error, setError] = useState('');

      async function startCopy() {
        setPhase('copying');
        setError('');
        let files = [];
        try {
          const res = await api.post('/data/copy', { to_dir: toDir });
          files = res.files || [];
          setMigratedFiles(files);
        } catch (e) {
          setError(e.message || 'Copy failed');
          setPhase('copy_error');
          return;
        }
        if (files.length === 0) {
          setPhase('saving');
          try {
            await api.post('/config', { data_dir: toDir });
            await api.post('/data/apply-location', { dir: toDir });
            onSuccess(toDir);
          } catch (e) {
            setError(e.message || 'Failed to save configuration');
            setPhase('copy_error');
          }
          return;
        }
        setPhase('verifying');
        try {
          await api.post('/data/verify', { to_dir: toDir, files });
        } catch (e) {
          setError(e.message || 'Verification failed — files may not have copied correctly');
          setPhase('verify_error');
          return;
        }
        setPhase('saving');
        try {
          await api.post('/config', { data_dir: toDir });
        } catch (e) {
          setError(e.message || 'Failed to save configuration');
          setPhase('copy_error');
          return;
        }
        setPhase('deleting');
        try {
          await api.post('/data/delete-originals', { files });
          await api.post('/data/apply-location', { dir: toDir });
          onSuccess(toDir);
        } catch (e) {
          setError(e.message || 'Failed to delete original files');
          setPhase('delete_error');
        }
      }

      async function retryDelete() {
        setPhase('deleting');
        setError('');
        try {
          await api.post('/data/delete-originals', { files: migratedFiles });
          await api.post('/data/apply-location', { dir: toDir });
          onSuccess(toDir);
        } catch (e) {
          setError(e.message || 'Failed to delete original files');
          setPhase('delete_error');
        }
      }

      const spinnerPhases = { copying: 'Copying files to new location…', verifying: 'Verifying copied files…', saving: 'Saving configuration…', deleting: 'Removing original files…' };

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
          <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-lg w-full mx-4 shadow-2xl">

            {phase === 'confirm' && (<>
              <h3 className="text-lg font-semibold text-white mb-2">Move application data?</h3>
              <p className="text-slate-400 text-sm mb-4">Your application data will be copied from the current location to the new one.</p>
              <div className="space-y-2 mb-5 text-xs font-mono">
                <div className="bg-slate-800 rounded-lg px-3 py-2">
                  <div className="text-slate-500 mb-1">From</div>
                  <div className="text-slate-200 break-all">{fromDir}</div>
                </div>
                <div className="bg-slate-800 rounded-lg px-3 py-2">
                  <div className="text-slate-500 mb-1">To</div>
                  <div className="text-slate-200 break-all">{toDir}</div>
                </div>
              </div>
              <div className="flex justify-end gap-3">
                <button onClick={onCancel} className="px-4 py-2 text-sm rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">Cancel</button>
                <button onClick={startCopy} className="px-4 py-2 text-sm rounded-lg font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-colors">Move files</button>
              </div>
            </>)}

            {spinnerPhases[phase] && (
              <div className="flex items-center gap-3 py-4">
                <svg className="animate-spin shrink-0" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <span className="text-slate-300 text-sm">{spinnerPhases[phase]}</span>
              </div>
            )}

            {(phase === 'copy_error' || phase === 'verify_error') && (<>

    function taggedToHtml(text) {
      const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const parts = [];
      for (const l of text.split('\n')) {
        const m = l.match(/^\[([^\]]+)\](.*)/s);
        if (!m) { if (l.trim()) parts.push(`<p style="margin:0 0 2px">${esc(l.trim())}</p>`); continue; }
        const tag = m[1].trim().toLowerCase(), c = esc(m[2].trim());
        if (tag === 'section heading') {
          parts.push(`<div style="font-weight:700;font-size:1em;border-bottom:1px solid #94a3b8;padding-bottom:1px;margin:12px 0 4px">${c}</div>`);
        } else if (tag === 'summary') {
          parts.push(`<p style="margin:0 0 4px">${c}</p>`);
        } else if (tag === 'job title') {
          parts.push(`<p style="font-weight:700;margin:8px 0 1px">${c}</p>`);
        } else if (tag === 'job summary') {
          parts.push(`<p style="margin:0 0 2px">${c}</p>`);
        } else if (tag === 'job bullet') {
          parts.push(`<div style="display:flex;gap:6px;margin:0 0 1px;padding-left:12px"><span style="flex-shrink:0">•</span><span>${c}</span></div>`);
        } else if (tag === 'skill') {
          const ci = c.indexOf(':');
          parts.push(ci !== -1
            ? `<p style="margin:0 0 1px"><strong>${c.slice(0,ci+1)}</strong>${c.slice(ci+1)}</p>`
            : `<p style="margin:0 0 1px">${c}</p>`);
        } else if (tag === 'additional info') {
          parts.push(`<p style="margin:0 0 1px;text-align:center">${c}</p>`);
        } else {
          parts.push(`<p style="margin:0 0 2px">${c}</p>`);
        }
      }
      return parts.join('');
    }

    function stripResumeTags(text) {
      return text.split('\n').map(l => l.replace(/^\[[^\]]+\]\s*/, '').trim()).filter(Boolean).join('\n');

                                        const data = await api.get('/ollama/models');
                                        setOllamaModels(data.available ? data.models : []);
                                      } catch { setOllamaModels([]); }
                                      setOllamaModelsLoading(false);
                                    }}
                                    disabled={ollamaModelsLoading}
                                    className="text-xs text-indigo-400 hover:text-indigo-300 disabled:opacity-50 transition-colors"
                                  >
                                    {ollamaModelsLoading ? 'Fetching…' : 'Fetch locally available models'}
                                  </button>
                                  <a
                                    href="https://ollama.com/library"
                                    target="_blank"
                                    rel="noreferrer"
                                    onClick={e => { if (window.pywebview?.api?.open_external) { e.preventDefault(); window.pywebview.api.open_external('https://ollama.com/library'); } }}
                                    className="text-xs text-indigo-400 hover:text-indigo-300 transition-colors flex items-center gap-1"
                                  >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                    Model list ↗
                                  </a>
                                </div>
                              </div>
                              {ollamaModels && ollamaModels.length > 0 ? (
                                <select
                                  value={ollamaModels.some(m => m.name === ollamaModel) ? ollamaModel : ''}
                                  onChange={e => setOllamaModel(e.target.value)}
                                  className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition-colors"
                                >
                                  <option value="" disabled>Select a model</option>
                                  {ollamaModels.map(m => (
                                    <option key={m.name} value={m.name}>
                                      {m.name}{m.supports_tools ? ' · tools ✓' : ''}
                                    </option>
                                  ))}
                                </select>
                              ) : (
                                <input
                                  type="text"
                                  value={ollamaModel}
                                  onChange={e => setOllamaModel(e.target.value)}
                                  placeholder="llama3.2"
                                  className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors"
                                />
                              )}
                              {ollamaModels !== null && ollamaModels.length === 0 && (
                                <p className="text-xs text-amber-500 mt-1">No models found — make sure Ollama is running and you have pulled at least one model.</p>
                              )}
                              {ollamaModels === null && (
                                <p className="text-xs text-slate-600 mt-1">Type a model name or click "Fetch locally available models" to see what's installed.</p>
                              )}
                              {modelLacksTools && (
                                <div className="flex items-start gap-1.5 mt-2">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-400 shrink-0 mt-0.5"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                  <p className="text-xs text-yellow-400">This model does not support tool calling. Sections marked with <WebSearchBadge size={11} /> will not be able to search the web.</p>
                                </div>
                              )}
                            </div>
                            <div>
                              {(() => {
                                const ctxIdx = Math.max(0, CTX_STEPS.findIndex(s => s.value === ollamaNumCtx));
                                return (<>
                                  <div className="flex items-center justify-between mb-1.5">
                                    <label className="text-xs font-medium text-slate-400">Context size <span className="font-normal text-slate-600">(num_ctx)</span></label>
                                    <span className="text-xs font-semibold text-indigo-400">{CTX_STEPS[ctxIdx].label}</span>
                                  </div>
                                  <input
                                    type="range"
                                    min={0}
                                    max={CTX_STEPS.length - 1}
                                    step={1}
                                    value={ctxIdx}
                                    onChange={e => setOllamaNumCtx(CTX_STEPS[parseInt(e.target.value)].value)}
                                    className="w-full accent-indigo-500 cursor-pointer"
                                  />
                                  <div className="flex justify-between mt-1">
                                    {CTX_STEPS.map(s => (
                                      <span key={s.label} className="text-xs text-slate-600">{s.label}</span>
                                    ))}
                                  </div>
                                </>);
                              })()}
                            </div>
                            <div className="flex justify-end pt-1">
                              <button
                                onClick={() => saveKey('ollama')}
                                disabled={!!savingProvider}
                                className="px-4 py-2 text-sm rounded-lg font-medium bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white transition-colors"
                              >
                                {savingProvider === 'ollama' ? 'Saving…' : 'Save'}
                              </button>
                            </div>
                          </div>
                        </>)}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Resume Info */}
            <div className="mt-10">
              <div className="mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wide">Resume Info</div>
              <p className="text-slate-500 text-sm mb-4">Used as the first two lines when exporting a resume to Word (.docx).</p>
              {resumeInfoMsg.text && (
                <div className={`mb-4 px-4 py-2 rounded-lg text-sm font-medium ${resumeInfoMsg.ok ? 'bg-emerald-900/40 text-emerald-400' : 'bg-red-900/40 text-red-400'}`}>
                  {resumeInfoMsg.text}
                </div>
              )}
              <div className="rounded-xl border border-slate-700/50 bg-slate-800/40 px-5 py-4 space-y-3">
                <div>
                  <label className="text-xs font-medium text-slate-400 block mb-1.5">Full name</label>
                  <input
                    type="text"
                    value={resumeName}
                    onChange={e => setResumeName(e.target.value)}
                    placeholder="Jane Smith"
                    className="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none focus:border-indigo-500"
                  />
                </div>
                <div>
                  <label className="text-xs font-medium text-slate-400 block mb-1.5">Contact info</label>
                  <input
                    type="text"
                    value={resumeContact}
                    onChange={e => setResumeContact(e.target.value)}
                    placeholder="jane@email.com | (555) 123-4567 | linkedin.com/in/jane"
                    className="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm focus:outline-none focus:border-indigo-500"
                  />
                </div>
                <button
                  onClick={async () => {
                    setSavingResumeInfo(true);
                    try {
                      await api.post('/config', { resume_name: resumeName, resume_contact: resumeContact });
                      setResumeInfoMsg({ text: 'Saved.', ok: true });
                      setTimeout(() => setResumeInfoMsg({ text: '', ok: true }), 3000);
                    } catch (e) {
                      setResumeInfoMsg({ text: e.message || 'Save failed', ok: false });
                    }
                    setSavingResumeInfo(false);
                  }}
                  disabled={savingResumeInfo}
                  className="px-4 py-2 rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 transition"
                >
                  {savingResumeInfo ? 'Saving…' : 'Save'}
                </button>
              </div>
            </div>

            {/* Data Storage */}
            <div className="mt-10">
              <div className="mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wide">Data Storage</div>
              <p className="text-slate-500 text-sm mb-4">Location where application data is stored.</p>
              {dataDirMsg.text && (
                <div className={`mb-4 px-4 py-2 rounded-lg text-sm font-medium ${dataDirMsg.ok ? 'bg-emerald-900/40 text-emerald-400' : 'bg-red-900/40 text-red-400'}`}>
                  {dataDirMsg.text}
                </div>
              )}
              <div className="rounded-xl border border-slate-700/50 bg-slate-800/40 px-5 py-4 space-y-3">
                <div>
                  <label className="text-xs font-medium text-slate-400 block mb-1.5">Storage folder</label>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      value={dataDir}
                      onChange={e => setDataDir(e.target.value)}
                      placeholder={defaultDataDir}
                      className="flex-1 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors font-mono"
                    />
                    <button
                      onClick={() => setDataDir(defaultDataDir)}
                      className="px-3 py-2 text-sm rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition-colors"
                      title="Reset to default location"
                    >
                      Default
                    </button>
                    {window.pywebview?.api?.open_folder_dialog && (
                      <button
                        onClick={async () => {
                          const path = await window.pywebview.api.open_folder_dialog(dataDir || defaultDataDir);
                          if (path) setDataDir(path);
                        }}
                        className="px-3 py-2 text-sm rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition-colors"
                        title="Browse for folder"
                      >
                        Browse…
                      </button>
                    )}
                    <button
                      onClick={() => {
                        const normPath = p => p.trim().replace(/[/\\]+$/, '').replace(/\\/g, '/');
                        const newDir = normPath(dataDir || defaultDataDir);
                        const oldDir = normPath(savedDataDir);
                        if (newDir.toLowerCase() === oldDir.toLowerCase()) {
                          setDataDirMsg({ text: 'Already using this location.', ok: true });
                          setTimeout(() => setDataDirMsg({ text: '', ok: true }), 3000);
                          return;
                        }
                        setPendingDataDir(newDir);
                        setShowMigration(true);
                      }}
                      disabled={savingDataDir}
                      className="px-4 py-2 text-sm rounded-lg font-medium bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white transition-colors"
                    >
                      Save
                    </button>
                  </div>
                  {defaultDataDir && (
                    <p className="text-xs text-slate-600 mt-1.5">
                      Default: <span className="font-mono text-slate-500">{defaultDataDir}</span>
                    </p>
                  )}
                </div>
                {dataFiles.length > 0 && (
                  <div className="border-t border-slate-700/50 pt-3">
                    <ul className="space-y-0.5">
                      {dataFiles.map(f => (
                        <li key={f.name} className="flex items-baseline gap-1.5 text-xs text-slate-500">
                          <span className="text-slate-600 shrink-0">•</span>
                          <span className="font-mono text-slate-400">{f.name}</span>
                          {f.note && <span className="text-slate-600">— {f.note}</span>}
                          {f.size_bytes != null && <span className="text-slate-600">— {formatBytes(f.size_bytes)}</span>}
                        </li>
                      ))}
                      {dataFilesExtra > 0 && (
                        <li className="text-xs text-slate-600 pl-3">and {dataFilesExtra} more…</li>
                      )}
                    </ul>
                  </div>
                )}
              </div>
            </div>

            {showMigration && (
              <MigrationModal
                fromDir={savedDataDir}
                toDir={pendingDataDir}
                onSuccess={newDir => {
                  setShowMigration(false);
                  setSavedDataDir(newDir);
                  setDataDir(newDir);
                  setDataDirMsg({ text: 'Data location updated.', ok: true });
                  setTimeout(() => setDataDirMsg({ text: '', ok: true }), 7000);
                }}
                onCancel={() => {
                  setShowMigration(false);
                  setDataDir(savedDataDir);
                }}
              />
            )}

          </div>
        </div>
      );
    }

    // ── Web Search Badge ─────────────────────────────────────────────────────
    function ResumeBadge({ size = 13 }) {
      return (
        <span title="This section requires a resume." style={{ cursor: 'help', display: 'inline-flex', alignItems: 'center' }}>
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: '#facc15' }}>
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            <line x1="8" x2="16" y1="13" y2="13"/>
            <line x1="8" x2="14" y1="17" y2="17"/>
          </svg>
        </span>
      );
    }

    function WebSearchBadge({ size = 13 }) {
      return (
        <span title="This section searches the web for real-time data. Works best with Anthropic or OpenAI models." style={{ cursor: 'help', display: 'inline-flex', alignItems: 'center' }}>
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ color: '#38bdf8' }}>
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
      );
    }

    const TECHNICAL_KEYWORDS = [
      'engineer', 'developer', 'programmer', 'software', 'coding', 'swe',
      'backend', 'frontend', 'fullstack', 'full-stack', 'full stack',
      'data scientist', 'data engineer', 'ml engineer', 'machine learning',
      'devops', 'sre',
    ];
    function isTechnicalRole(position) {
      const lower = (position || '').toLowerCase();
      return TECHNICAL_KEYWORDS.some(kw => lower.includes(kw));
    }

    // ── Sidebar ─────────────────────────────────────────────────────────────
    function Sidebar({ currentStep, completedSteps, onStepClick, onConfigClick, onAboutClick, stateId, selectedCompanyName = '', needsConfig = false, customActions = [], onAddCustomAction, queueStatus = { running: null, queued: [], failed: [] }, isTech = false }) {
      const companyName = (selectedCompanyName || '').trim();
      const sidebarQueueItem = (sectionKey) => {
        if (!stateId) return null;
        const items = [queueStatus.running, ...(queueStatus.queued || []), ...(queueStatus.failed || [])].filter(Boolean);
        return items.find((item) => item.state_id === stateId && item.section_key === sectionKey) || null;
      };
      const renderStepIcon = (icon, isDone, isActive, queueItem) => {
        const isRunning = queueItem?.status === 'running' || queueItem?.status === 'canceling';
        const isQueued = queueItem?.status === 'queued';
        const isFailed = queueItem?.status === 'failed';
        const statusLabel = isFailed ? 'Failed' : isRunning ? 'Running' : isQueued ? 'Queued' : '';
        return (
          <span className={`relative w-8 h-8 shrink-0 rounded-lg flex items-center justify-center text-lg
            ${isFailed ? 'bg-red-900/80 text-red-100' : isDone ? 'step-done text-white' : isActive ? 'step-active text-white' : 'bg-slate-800 text-slate-400'}`}
            title={statusLabel || undefined}
            aria-label={statusLabel || undefined}
          >
            {isFailed ? '!' : isRunning ? (
              <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
            ) : isDone ? '✓' : icon}
            {isQueued && (
              <span className="absolute -top-0.5 -right-0.5 w-3 h-3 rounded-full bg-amber-500 text-slate-950 flex items-center justify-center text-[8px] leading-none" title="Queued">
                ⌛
              </span>
            )}
          </span>
        );
      };

      return (
        <aside className="w-60 bg-slate-900 border-r border-slate-800 flex flex-col h-screen sticky top-0 shrink-0">
          <div className="p-5 border-b border-slate-800">
            <div className="flex items-center justify-between gap-1">
              <button
                onClick={onAboutClick}
                className={`p-1 rounded transition-colors shrink-0 ${currentStep === 'about' ? 'text-indigo-400' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}
                title="About"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="16" x2="12" y2="12"/>
                  <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
              </button>
              <h1 className="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent flex-1 text-center">
                Interview Flow
              </h1>
              <button
                onClick={onConfigClick}
                className={`p-1 rounded transition-colors shrink-0 ${currentStep === 'config' ? 'text-indigo-400' : needsConfig ? 'text-amber-500' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}`}
                title="App Configuration"
              >
                <svg className={needsConfig && currentStep !== 'config' ? 'cog-pulse' : ''} xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <p className="text-xs text-slate-500 mt-1">AI interview prep</p>
          </div>
          {companyName && (
            <div className="px-4 py-3 border-b border-slate-800 bg-slate-900/70">
              <div className="text-sm font-semibold text-slate-200 truncate">{companyName}</div>
              <div className="text-xs text-slate-500 mt-0.5">Currently selected company</div>
            </div>
          )}
          <nav className="flex-1 overflow-y-auto py-3">
            {STEPS.map((step) => {
              const isDone = completedSteps.includes(step.id);
              const isActive = currentStep === step.id;
              const isLocked = !stateId && step.id !== 'setup';
              const queueItem = sidebarQueueItem(step.id);
              return (
                <button
                  key={step.id}
                  onClick={() => !isLocked && onStepClick(step.id)}
                  disabled={isLocked}
                  className={`w-full text-left px-4 py-3 flex items-center gap-3 transition-all
                    ${isActive ? 'bg-slate-800 border-r-2 border-indigo-500' : 'hover:bg-slate-800/50'}
                    ${isLocked ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'}`}
                >
                  {renderStepIcon(step.icon, isDone, isActive, queueItem)}
                  <div>
                    <div className={`text-sm font-medium ${isActive ? 'text-white' : 'text-slate-300'} flex items-center gap-1`}>
                      {step.label}
                      {step.webSearch && <WebSearchBadge size={11} />}
                      {(step.needsResume || step.resumeBadge) && <ResumeBadge size={11} />}
                      {step.id === 'interview_intel' && isTech && (
                        <span title="Technical role detected — AI will also search for coding problems, system design questions, and technical interview patterns." className="text-[10px] font-medium text-sky-400 leading-none cursor-default">(tech)</span>
                      )}
                    </div>
                    <div className="text-xs text-slate-500">{step.desc}</div>
                  </div>
                </button>
              );
            })}

            <>
                <div className="px-4 flex items-center gap-2" style={{ height: '2rem', marginTop: '0.5rem' }}>
                  <div className="flex-1 h-px bg-slate-800" />
                  <span className="text-xs text-slate-600 font-medium whitespace-nowrap">Custom actions</span>
                  <div className="flex-1 h-px bg-slate-800" />
                </div>

                {customActions.map((action) => {
                  const stepId = `custom_${action.id}`;
                  const isActive = currentStep === stepId;
                  const isDone = completedSteps.includes(stepId);
                  const queueItem = sidebarQueueItem(`custom:${action.id}`);
                  return (
                    <button
                      key={action.id}
                      onClick={() => onStepClick(stepId)}
                      className={`w-full text-left px-4 py-3 flex items-center gap-3 transition-all cursor-pointer
                        ${isActive ? 'bg-slate-800 border-r-2 border-indigo-500' : 'hover:bg-slate-800/50'}`}
                    >
                      {renderStepIcon('⚡', isDone, isActive, queueItem)}
                      <div className="min-w-0">
                        <div className={`text-sm font-medium truncate ${isActive ? 'text-white' : 'text-slate-300'}`}>{action.name}</div>
                        <div className="text-xs text-slate-500 truncate">{action.description || 'Custom action'}</div>
                      </div>
                    </button>
                  );
                })}

                <button
                  onClick={onAddCustomAction}
                  className="w-full text-left px-4 py-3 flex items-center gap-3 hover:bg-slate-800/50 transition-all cursor-pointer"
                >
                  <span className="w-8 h-8 shrink-0 rounded-lg flex items-center justify-center text-lg bg-slate-800/60 text-slate-500 border border-dashed border-slate-700">
                    +
                  </span>
                  <div>
                    <div className="text-sm font-medium text-slate-400">Add new</div>
                    <div className="text-xs text-slate-600">Add new custom action</div>
                  </div>
                </button>
            </>
          </nav>
          {stateId && (
            <div className="p-4 border-t border-slate-800">
              <div className="text-xs text-slate-500">
                Progress: {completedSteps.length}/{STEPS.length} steps
              </div>
              <div className="mt-2 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div
                  className="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all"
                  style={{ width: `${(completedSteps.length / STEPS.length) * 100}%` }}
                />
              </div>
            </div>
          )}
        </aside>
      );
    }

    // ── Setup Step ──────────────────────────────────────────────────────────
    function SetupStep({ onSetup, existingStates, onLoadState, onDeleteState, onCloneState, onNewApplication, loadedStateId = '', initialJobPosting = '', initialResume = '', initialResumeRaw = '', initialCompanyName = '', initialPosition = '', onTechChange, activeProvider = '', activeModel = '' }) {
      const [jobPosting, setJobPosting] = useState(initialJobPosting);
      const [resume] = useState(initialResume);
      const [resumeRaw] = useState(initialResumeRaw);
      const [companyName, setCompanyName] = useState(initialCompanyName);
      const [position, setPosition] = useState(initialPosition);
      const techDetected = isTechnicalRole(position);

      useEffect(() => { onTechChange?.(techDetected); }, [techDetected]);
      const [loading, setLoading] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [deletingStateId, setDeletingStateId] = useState('');
      const [cloningStateId, setCloningStateId] = useState('');
      const [confirmNew, setConfirmNew] = useState(false);

      const hasUnsavedChanges = () => {
        return (
          companyName !== (initialCompanyName || '') ||
          position !== (initialPosition || '') ||
          jobPosting !== (initialJobPosting || '') ||
          resume !== (initialResume || '')
        );
      };

      const handleNewApplication = () => {
        if (hasUnsavedChanges()) {
          setConfirmNew(true);
        } else {
          onNewApplication();
        }
      };

      const handleSubmit = async () => {
        if (!jobPosting.trim()) return;
        setLoading(true);
        try {
          const path = loadedStateId ? `/${loadedStateId}/setup-update` : '/setup';
          const data = await api.post(path, { job_posting: jobPosting, resume, resume_raw: resumeRaw, company_name: companyName, position });
          onSetup(data.state || {
            id: loadedStateId || data.id,
            company_name: companyName,
            position,
            job_posting: jobPosting,
            resume,
            current_step: 'setup',
            completed_steps: ['setup'],
          });
        } catch (e) {
          alert('Error: ' + e.message);
        }
        setLoading(false);
      };

      const handleConfirmDelete = async () => {
        if (!confirmDelete) return;
        setDeletingStateId(confirmDelete.id);
        try {
          await onDeleteState(confirmDelete.id);
          setConfirmDelete(null);
        } catch (e) {
          alert('Delete error: ' + e.message);
        }
        setDeletingStateId('');
      };

      const handleClone = async (id) => {
        setCloningStateId(id);
        try {
          await onCloneState(id);
        } catch (e) {
          alert('Clone error: ' + e.message);
        }
        setCloningStateId('');
      };

      const providerLabels = { anthropic: 'Anthropic', openai: 'OpenAI', gemini: 'Google Gemini', ollama: 'Ollama' };
      const apiLabel = (activeProvider && activeModel)
        ? `${providerLabels[activeProvider] || activeProvider} - ${activeModel}`
        : '';

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
          {/* Header row */}
          <div className="flex items-start justify-between mb-4 shrink-0">
            <div>
              <div className="flex items-baseline gap-3 mb-1">
                <h2 className="text-2xl font-bold">Setup</h2>
                {apiLabel && <span className="text-sm font-medium text-emerald-300">{apiLabel}</span>}
              </div>
              <p className="text-slate-400">Paste your job posting to begin the interview preparation workflow.</p>
            </div>
            <button
              onClick={handleSubmit}
              disabled={!jobPosting.trim() || loading}
              className="ml-6 px-6 py-2.5 rounded-xl font-medium text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 disabled:opacity-50 disabled:cursor-not-allowed transition whitespace-nowrap shrink-0"
            >
              {loading ? 'Saving...' : 'Save & Continue →'}
            </button>
          </div>

          {/* New application + previous applications */}
          <div className="shrink-0">
            <div className="mb-3 flex items-center gap-3">
              <button
                onClick={handleNewApplication}
                disabled={!loadedStateId && !companyName && !jobPosting && !resume}
                className="px-4 py-2 rounded-xl text-sm font-semibold bg-indigo-600 hover:bg-indigo-500 text-white transition whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed"
              >
                New application
              </button>
            </div>

            {existingStates.length > 0 && (
              <details className="mb-4 bg-slate-900 rounded-xl border border-slate-800">
                <summary className="px-4 py-3 cursor-pointer hover:bg-slate-800/50 transition rounded-xl flex items-center justify-between">
                  <span className="text-sm font-semibold text-slate-300">{`Previous applications (${existingStates.length})`}</span>
                  <span className="text-xs text-slate-500">Expand to select or manage</span>
                </summary>
                <div className="px-4 pb-4 space-y-2 max-h-64 overflow-y-auto">
                  {existingStates.map((s) => (
                    <div key={s.id} className="p-3 rounded-lg bg-slate-800 flex items-center gap-3">
                      <button onClick={() => onLoadState(s.id)} className="px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-600 bg-slate-700/40 text-slate-300 hover:bg-slate-600/50 transition shrink-0">
                        Select
                      </button>
                      <div className="flex-1">
                        <span className="font-medium text-slate-300">
                          {`${s.company_name}${s.position ? ` — ${s.position}` : ''}`}
                        </span>
                        <span className="text-xs text-slate-500 ml-2">{s.completed_steps.length} steps done</span>
                        <div className="text-xs text-slate-500">{new Date(s.updated_at).toLocaleDateString()}</div>
                      </div>
                      <button onClick={() => handleClone(s.id)} disabled={cloningStateId === s.id} className="px-3 py-1.5 rounded-lg text-xs font-medium border border-indigo-800 bg-indigo-950/40 text-indigo-300 hover:bg-indigo-900/50 disabled:opacity-50 transition">
                        {cloningStateId === s.id ? 'Cloning...' : 'Clone'}
                      </button>
                      <button onClick={() => setConfirmDelete(s)} disabled={deletingStateId === s.id} className="px-3 py-1.5 rounded-lg text-xs font-medium border border-red-800 bg-red-950/40 text-red-300 hover:bg-red-900/50 disabled:opacity-50 transition">
                        {deletingStateId === s.id ? 'Deleting...' : 'Delete'}
                      </button>
                    </div>
                  ))}
                </div>
              </details>
            )}

            <div className="grid grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-sm font-medium text-slate-300 mb-2">Company Name</label>
                <input value={companyName} onChange={(e) => setCompanyName(e.target.value)} placeholder="e.g., Stripe"
                  className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
                <p className="text-xs text-slate-500 mt-1">Used in AI prompts. Text after <code className="text-slate-400">|</code> is treated as a comment and stripped — e.g. <span className="text-slate-400">Stripe | Series B startup</span></p>
              </div>
              <div>
                <div className="flex items-center gap-2 mb-2">
                  <label className="text-sm font-medium text-slate-300">Position</label>
                  {techDetected && <span title="Technical role detected — Interview Intel will also search for coding problems, system design questions, and technical interview patterns." className="text-xs font-medium text-sky-400 cursor-default">(tech)</span>}
                </div>
                <input value={position} onChange={(e) => setPosition(e.target.value)} placeholder="e.g. Software Engineer"
                  className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" />
                <p className="text-xs text-slate-500 mt-1">Used in AI prompts. Text after <code className="text-slate-400">|</code> is treated as a comment and stripped — e.g. <span className="text-slate-400">Software Engineer | mid-level</span></p>
              </div>
            </div>

            <label className="block text-sm font-medium text-slate-300 mb-2">Job Posting *</label>
          </div>

          {/* Job posting fills remaining space */}
          <div className="flex flex-col flex-1 min-h-0">
            <textarea
              value={jobPosting}
              onChange={(e) => setJobPosting(e.target.value)}
              placeholder="Paste the full job description here..."
              className="w-full flex-1 min-h-0 px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition resize-none"
            />
          </div>

          {confirmDelete && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-2xl">
                <h3 className="text-lg font-semibold text-white mb-2">Delete application?</h3>
                <p className="text-sm text-slate-400 mb-6">
                  {`Delete ${confirmDelete.company_name}? This removes the saved workflow from this computer.`}
                </p>
                <div className="flex justify-end gap-3">
                  <button
                    onClick={() => setConfirmDelete(null)}
                    disabled={deletingStateId === confirmDelete.id}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 disabled:opacity-50 transition"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={handleConfirmDelete}
                    disabled={deletingStateId === confirmDelete.id}
                    className="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500 disabled:opacity-50 transition"
                  >
                    {deletingStateId === confirmDelete.id ? 'Deleting...' : 'Delete'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {confirmNew && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 px-4">
              <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-2xl">
                <h3 className="text-lg font-semibold text-white mb-2">Discard unsaved changes?</h3>
                <p className="text-sm text-slate-400 mb-6">
                  You have unsaved changes. Starting a new application will discard them. Continue?
                </p>
                <div className="flex justify-end gap-3">
                  <button
                    onClick={() => setConfirmNew(false)}
                    className="px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition"
                  >
                    Stay on page
                  </button>
                  <button
                    onClick={() => { setConfirmNew(false); onNewApplication(); }}
                    className="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-500 transition"
                  >
                    Discard &amp; continue
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function createLiveTrace() {
      return { systemPrompt: '', userPrompt: '', response: '', toolUses: [] };
    }

    function hasPositiveQueryCost(costUsd) {
      return typeof costUsd === 'number' && Number.isFinite(costUsd) && costUsd > 0;
    }

    function formatQueryCost(costUsd) {
      if (!hasPositiveQueryCost(costUsd)) return '';
      const rounded = Math.round(costUsd * 100) / 100;
      return `$${rounded.toFixed(2)} query cost`;
    }

    function formatTotalQueryCost(costs) {
      const validCosts = (costs || []).filter((cost) => hasPositiveQueryCost(cost));
      if (!validCosts.length) return '';
      const total = validCosts.reduce((sum, cost) => sum + cost, 0);
      const rounded = Math.round(total * 100) / 100;
      return `Cost: $${rounded.toFixed(2)} · Queries: ${validCosts.length}`;
    }

    function formatBytes(bytes) {
      if (typeof bytes !== 'number' || bytes < 0) return '';
      if (bytes >= 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
      if (bytes >= 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${bytes} B`;
    }

    function formatQueryDuration(durationMs) {
      if (typeof durationMs !== 'number' || !Number.isFinite(durationMs) || durationMs <= 0) return '';
      const roundedMs = Math.round(durationMs);
      if (roundedMs < 1000) return `${roundedMs}ms`;
      if (roundedMs < 60000) {
        const seconds = roundedMs / 1000;
        return `${seconds.toFixed(seconds < 10 ? 1 : 0)}s`;
      }
      const totalSeconds = Math.round(roundedMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return seconds ? `${minutes}m ${seconds}s` : `${minutes}m`;
    }

    function formatLocalQueryTime(ranAt) {
      if (!ranAt) return '';
      const date = new Date(ranAt);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString(undefined, {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        timeZoneName: 'short',
      });
    }

    function formatLocalQueryRange(details = []) {
      const dates = (details || [])
        .map((detail) => new Date(detail?.ranAt || ''))
        .filter((date) => !Number.isNaN(date.getTime()))
        .sort((a, b) => a.getTime() - b.getTime());
      if (!dates.length) return '';
      const earliest = formatLocalQueryTime(dates[0].toISOString());
      const latest = formatLocalQueryTime(dates[dates.length - 1].toISOString());
      return earliest && latest ? `${earliest} to ${latest}` : earliest || latest || '';
    }

    function formatDebriefQueryTooltip(details = []) {
      if (!details.length) return '';

      const totalDurationMs = details.reduce((sum, detail) => {
        const durationMs = detail?.durationMs;
        return sum + (typeof durationMs === 'number' && Number.isFinite(durationMs) && durationMs > 0 ? durationMs : 0);
      }, 0);
      const rangeText = formatLocalQueryRange(details) || 'Unavailable';
      const sectionLines = details.map((detail) =>
        `  ${detail.label}: ${(detail?.modelName || '').trim() || 'Unavailable'}`
      );

      return [
        `${details.length} section${details.length !== 1 ? 's' : ''} ran:`,
        ...sectionLines,
        `Total duration: ${formatQueryDuration(totalDurationMs) || 'Unavailable'}`,
        `Ran between (local): ${rangeText}`,
      ].join('\n');
    }

    function QueryCostBadge({ label, details = [], tooltipText = '' }) {
      if (!label) return null;

      const normalizedDetails = (details && details.length ? details : [{}]).map((detail, index) => ({
        label: detail?.label || `Query ${index + 1}`,
        modelName: detail?.modelName || 'Unavailable',
        duration: formatQueryDuration(detail?.durationMs) || 'Unavailable',
        ranAt: formatLocalQueryTime(detail?.ranAt) || 'Unavailable',
      }));
      const tooltip = tooltipText || normalizedDetails.map((detail) => (
        `${detail.label}\nModel: ${detail.modelName}\nDuration: ${detail.duration}\nRan (local): ${detail.ranAt}`
      )).join('\n\n');

      return (
        <span className="inline-flex items-center gap-2">
          <span className="text-sm font-medium text-emerald-300">{label}</span>
          <button
            type="button"
            aria-label="Show query details"
            title={tooltip}
            className="inline-flex h-5 w-5 items-center justify-center rounded-full border border-emerald-300/90 bg-emerald-300 text-[11px] font-semibold text-slate-950 transition hover:bg-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-400/40"
          >
            i
          </button>
        </span>
      );
    }

    function LiveTracePanel({ trace, title = 'Live AI Request / Response' }) {
      if (!trace) return null;

      const [copiedKey, setCopiedKey] = useState('');
      const [collapsed, setCollapsed] = useState({ systemPrompt: true, userPrompt: true, response: false });
      const [countdown, setCountdown] = useState(null);
      const responseRef = useRef(null);
      const pinnedToBottom = useRef(true);

      const toggle = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));

      const handleResponseScroll = () => {
        if (!responseRef.current) return;
        const { scrollTop, scrollHeight, clientHeight } = responseRef.current;
        pinnedToBottom.current = (scrollHeight - scrollTop - clientHeight) < 6;
      };

      useEffect(() => {
        if (pinnedToBottom.current && responseRef.current) {
          responseRef.current.scrollTop = responseRef.current.scrollHeight;
        }
      }, [trace.response]);

      useEffect(() => {
        const rem = trace.retryRemaining ?? null;
        setCountdown(rem);
        if (rem === null || rem <= 0) return;
        const id = setInterval(() => setCountdown(c => (c <= 1 ? 0 : c - 1)), 1000);
        return () => clearInterval(id);
      }, [trace.retryRemaining]);

      const copyToClipboard = (key, text) => {
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          setCopiedKey(key);
          setTimeout(() => setCopiedKey(''), 2000);
        });
      };

      const toolUses = trace.toolUses || [];

      const responsePlaceholder = toolUses.length > 0 && !trace.response
        ? `Searched ${toolUses.filter(t => t.tool === 'WebSearch').length} source(s) so far, AI is reading through results…`
        : 'AI is thinking, response will appear here shortly…';

      const sections = [
        { key: 'systemPrompt', label: 'System Prompt', text: trace.systemPrompt, copyable: false },
        { key: 'userPrompt', label: 'User Prompt', text: trace.userPrompt, copyable: true },
        { key: 'response', label: 'Streaming Response', text: trace.response || responsePlaceholder, copyable: false },
      ];

      return (
        <div className="mb-6 bg-slate-900 border border-indigo-900/60 rounded-xl overflow-hidden">
          <div className="px-4 py-3 bg-indigo-950/40 border-b border-indigo-900/60">
            <div className="text-sm font-semibold text-indigo-300">{title}</div>
            <div className="text-xs text-slate-400 mt-1">This panel is temporary and will be replaced by the final result when the run finishes.</div>
          </div>
          <div className="p-4 space-y-4">
            {countdown !== null && (
              <div className="flex items-center gap-2 px-3 py-2 bg-amber-950/40 border border-amber-700/50 rounded-lg text-xs text-amber-300">
                <span>⏳</span>
                <span>{countdown === -1 ? 'Retrying…' : countdown > 0 ? `Rate limit reached — retrying in ${countdown}s…` : 'Rate limit reached — retrying now…'}</span>
              </div>
            )}
            {toolUses.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">
                  Web Activity <span className="normal-case font-normal text-slate-500">({toolUses.length})</span>
                </div>
                <div className="bg-slate-950 border border-slate-800 rounded-lg p-3 max-h-48 overflow-y-auto space-y-1">
                  {toolUses.map((tu, i) => {
                    const isSearch = tu.tool === 'WebSearch';
                    const label = isSearch ? (tu.input?.query || '') : (tu.input?.title || tu.input?.url || '');
                    return (
                      <div key={i} className="flex items-start gap-2 text-xs">
                        <span className={`shrink-0 mt-0.5 ${isSearch ? 'text-amber-400' : 'text-sky-400'}`}>
                          {isSearch ? '🔍' : '🌐'}
                        </span>
                        <span className="text-slate-300 break-all">{label}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {sections.map((section) => {
              const isCollapsed = collapsed[section.key];
              return (
                <div key={section.key}>
                  <div className="flex items-center justify-between mb-2">
                    <button
                      onClick={() => toggle(section.key)}
                      className="flex items-center gap-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wide hover:text-slate-200 transition"
                    >
                      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"
                        style={{ transform: isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)', transition: 'transform 0.15s' }}>
                        <path d="M1.5 3.5l4.5 5 4.5-5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                      {section.label}
                    </button>
                    {!isCollapsed && section.copyable && section.text && (
                      <button
                        onClick={() => copyToClipboard(section.key, section.text)}
                        className="text-xs px-2 py-0.5 rounded bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-slate-200 transition"
                      >
                        {copiedKey === section.key ? '✓ Copied' : 'Copy'}
                      </button>
                    )}
                  </div>
                  {!isCollapsed && (
                    section.key === 'response' ? (
                      <pre
                        ref={responseRef}
                        onScroll={handleResponseScroll}
                        className="whitespace-pre-wrap break-words bg-slate-950 border border-slate-800 rounded-lg p-4 text-sm text-slate-200 overflow-y-auto max-h-64"
                      >{section.text}</pre>
                    ) : (
                      <pre className="whitespace-pre-wrap break-words bg-slate-950 border border-slate-800 rounded-lg p-4 text-sm text-slate-200 overflow-x-auto max-h-64">{section.text || 'Waiting...'}</pre>
                    )
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Error Block ──────────────────────────────────────────────────────────────
    function ErrorBlock({ message, detail }) {
      const [expanded, setExpanded] = React.useState(false);
      const [copied, setCopied] = React.useState(false);
      const fullText = detail ? `${message}\n\n${detail}` : message;
      const copy = () => {
        navigator.clipboard.writeText(fullText).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };
      return (
        <div className="p-4 rounded-xl bg-red-900/30 border border-red-800 text-red-300 mb-4 shrink-0">
          <div className="flex items-start gap-2">
            {detail && (
              <button
                onClick={() => setExpanded(v => !v)}
                className="mt-0.5 shrink-0 text-red-400 hover:text-red-200 transition"
                title={expanded ? 'Hide details' : 'Show details'}
              >
                <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"
                  style={{ transform: expanded ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform 0.15s' }}>
                  <path d="M2 4.5l5 5 5-5" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            )}
            <span className="flex-1">{message}</span>
            <button
              onClick={copy}
              className="shrink-0 text-xs text-red-400 hover:text-red-200 transition border border-red-800 rounded px-2 py-0.5"
              title="Copy error details to clipboard"
            >
              {copied ? 'Copied!' : 'Copy'}
            </button>
          </div>
          {expanded && detail && (
            <pre className="mt-3 text-xs text-red-400 font-mono whitespace-pre-wrap break-all border-t border-red-800/60 pt-3">{detail}</pre>
          )}
        </div>
      );
    }

    // ── Resume Step ─────────────────────────────────────────────────────────
    function ResumeStep({ stateId, currentResume, currentResumeRaw, currentResumeTagged, savedResumes, onResumeUpdate, onContinue }) {
      const [resume, setResume] = useState(currentResume || '');
      const [resumeRaw, setResumeRaw] = useState(currentResumeRaw || '');
      const [resumeTagged, setResumeTagged] = useState(currentResumeTagged || '');
      const [resumeTab, setResumeTab] = useState('edit');
      const textareaRef = useRef(null);
      const [uploadStatus, setUploadStatus] = useState('');
      const [uploadedFileName, setUploadedFileName] = useState('');
      const [dragOver, setDragOver] = useState(false);
      const [saving, setSaving] = useState(false);
      const [showSaveDialog, setShowSaveDialog] = useState(false);
      const [saveDescription, setSaveDescription] = useState('');
      const [selectedResumeDescription, setSelectedResumeDescription] = useState('');
      const [selectingId, setSelectingId] = useState('');
      const [deletingId, setDeletingId] = useState('');
      const [loadingResume, setLoadingResume] = useState(false);
      const [resumeVersion, setResumeVersion] = useState(0);
      const [showContact, setShowContact] = useState(false);
      const [contactName, setContactName] = useState('');
      const [contactInfo, setContactInfo] = useState('');
      const fileInputRef = useRef(null);
      const detailsRef = useRef(null);
      const lastCurrentResumeRef = useRef(currentResume || '');

      useEffect(() => {
        api.get('/config').then(cfg => {
          setContactName(cfg.resume_name || '');
          setContactInfo(cfg.resume_contact || '');
        }).catch(() => {});
      }, []);

      useEffect(() => {
        const nextResume = currentResume || '';
        if (lastCurrentResumeRef.current !== nextResume) {
          setResume(nextResume);
          lastCurrentResumeRef.current = nextResume;
        }
        setResumeRaw(currentResumeRaw || '');
        setResumeTagged(currentResumeTagged || '');
      }, [currentResume, currentResumeRaw, currentResumeTagged]);

      useEffect(() => {
        const nextResume = currentResume || '';
        const matchingSavedResume = savedResumes.find(r => r.text === nextResume);
        if (matchingSavedResume) setSelectedResumeDescription(matchingSavedResume.description || '');
      }, [currentResume, savedResumes]);

      const handleFileUpload = async (file) => {
        if (!file) return;
        const allowed = ['.pdf', '.docx', '.doc', '.txt', '.md', '.rtf'];
        const ext = '.' + file.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) { alert(`Unsupported file type: ${ext}\nAccepted: ${allowed.join(', ')}`); return; }
        if (file.size > 10 * 1024 * 1024) { alert('File too large (max 10 MB)'); return; }
        setUploadStatus('uploading');
        setUploadedFileName(file.name);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch('/api/upload-resume', { method: 'POST', body: formData });
          if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || 'Upload failed'); }
          const data = await res.json();
          setResume(data.text);
          setResumeRaw(data.raw || '');
          setResumeTagged(data.tagged || '');
          setResumeTab('edit');
          setUploadStatus('done');
          setSelectedResumeDescription(file.name);
          await api.post(`/${stateId}/resumes`, { text: data.text, description: file.name, raw: data.raw || '' });
          await onResumeUpdate();
        } catch (e) {
          setUploadStatus('error');
          alert('Upload error: ' + e.message);
        }
      };

      const handleDrop = (e) => { e.preventDefault(); setDragOver(false); const file = e.dataTransfer.files?.[0]; if (file) handleFileUpload(file); };

      const handleSaveToLibrary = async () => {
        if (!resumeTagged.trim() && !resume.trim()) return;
        setSaving(true);
        setShowSaveDialog(false);
        try {
          const description = saveDescription.trim() || selectedResumeDescription || `Resume - ${new Date().toLocaleDateString()}`;
          const plain = resumeTagged ? stripResumeTags(resumeTagged) : resume;
          await api.post(`/${stateId}/resumes`, { text: plain, tagged: resumeTagged, description });
          await onResumeUpdate();
          setSelectedResumeDescription(description);
          setSaveDescription('');
        } catch (e) { alert('Save error: ' + e.message); }
        setSaving(false);
      };

      const handleInsertTag = (tag) => {
        if (resumeTab !== 'edit') setResumeTab('edit');
        const ta = textareaRef.current;
        const text = resumeTagged;
        const pos = ta ? (ta.selectionStart ?? text.length) : text.length;
        const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
        const lineEnd = text.indexOf('\n', pos);
        const end = lineEnd === -1 ? text.length : lineEnd;
        const line = text.slice(lineStart, end);
        const cleanLine = line.replace(/^\[[^\]]+\]\s*/, '');
        const newTag = `[${tag}]`;
        const newText = text.slice(0, lineStart) + newTag + cleanLine + text.slice(end);
        setResumeTagged(newText);
        requestAnimationFrame(() => {
          if (ta) { ta.focus(); ta.setSelectionRange(lineStart + newTag.length, lineStart + newTag.length); }
        });
      };

      const openSaveDialog = () => {
        setSaveDescription(selectedResumeDescription || '');
        setShowSaveDialog(true);
      };

      const handleSelect = async (resumeId) => {
        const selected = savedResumes.find(r => r.id === resumeId);
        if (!selected) return;
        setSelectingId(resumeId);
        if (detailsRef.current) detailsRef.current.open = false;
        setLoadingResume(true);
        setResumeTab('edit');
        await new Promise(r => setTimeout(r, 400));
        setResume(selected.text);
        lastCurrentResumeRef.current = selected.text;
        setSelectedResumeDescription(selected.description || '');
        setResumeVersion(v => v + 1);
        setLoadingResume(false);
        try {
          await api.post(`/${stateId}/resumes/${resumeId}/select`, {});
          await onResumeUpdate();
        } catch (e) { alert('Error: ' + e.message); }
        setSelectingId('');
      };

      const handleDelete = async (resumeId) => {
        setDeletingId(resumeId);
        try {
          await api.del(`/${stateId}/resumes/${resumeId}`);
          onResumeUpdate();
        } catch (e) { alert('Error: ' + e.message); }
        setDeletingId('');
      };

      return (
        <div className="fade-in w-full flex flex-col flex-1 min-h-0 pr-8">
